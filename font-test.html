<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FONT CHECK - EMERGENCY</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; background: #111;">

    <script type="module">
        console.log("A-Frame Scene is starting...");
    </script>

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-entity camera position="0 0 5"></a-entity>

        <a-sky color="#333"></a-sky>

        <a-box position="0 -1 -2" scale="5 0.5 0.1" color="red"></a-box>

        <a-text 
            value="表示テスト: 日本語" 
            font="assets/fonts/mplus-msdf.json"
            font-image="assets/fonts/mplus-msdf.png"
            shader="msdf" 
            negate="false"
            color="#00f2ff" 
            width="8" 
            position="0 0.5 -2" 
            align="center">
        </a-text>
    </a-scene>

</body>
</html>
