<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D描画テスト</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body style="margin:0;">

    <a-scene embedded vr-mode-ui="enabled: false" background="color: skyblue">
        
        <a-entity camera position="0 1.6 5"></a-entity>
        
        <a-box position="0 1.6 -2" color="red" width="1" height="1" depth="1"></a-box>

        <a-text 
            value="Hello AR World!" 
            position="0 2.5 -2" 
            align="center" 
            color="black"
            width="10">
        </a-text>

    </a-scene>

    <script type="module">
        console.log("A-Frame version:", AFRAME.version);
    </script>
</body>
</html>
