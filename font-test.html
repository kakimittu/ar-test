<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>日本語フォント最終確認</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body style="margin: 0;">

    <a-scene embedded vr-mode-ui="enabled: false" background="color: #222">
        
        <a-entity camera position="0 1.6 4"></a-entity>

        <a-text 
            value="日本語テスト成功" 
            font="assets/fonts/mplus-msdf.json"
            font-image="assets/fonts/mplus-msdf.png"
            shader="msdf" 
            negate="false"
            color="#00f2ff" 
            width="8" 
            position="0 1.6 -1" 
            align="center">
        </a-text>

        <a-box position="0 0.5 -1" color="red" width="1" height="0.2" depth="0.2"></a-box>

    </a-scene>

    <script type="module">
        console.log("A-Frame Version:", AFRAME.version);
        // 1秒後にログを出して、読み込みが止まっていないか確認
        setTimeout(() => {
            console.log("Scene is active. If you see only white/black, check the console for 404 errors.");
        }, 1000);
    </script>
</body>
</html>
