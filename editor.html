<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Editor - Fix Version</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px; color: white;
        }
        input { padding: 8px; width: 200px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #00f2ff; border: none; border-radius: 4px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin:0 0 10px 0; font-size: 14px;">テキスト編集</h3>
        <input type="text" id="textInput" placeholder="文字を入力...">
        <button id="updateBtn">反映する</button>
        <p id="status" style="font-size: 10px; margin-top: 5px; color: #ccc;">待機中...</p>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" background="color: #222">
        <a-entity camera position="0 1.6 3"></a-entity>
        
        <a-text 
            id="previewText"
            value="READY" 
            font="./assets/fonts/mplus-msdf.json"
            font-image="./assets/fonts/mplus-msdf.png"
            shader="msdf" 
            negate="false"
            color="#00f2ff" 
            width="6" 
            position="0 1.6 -1" 
            align="center">
        </a-text>

        <a-plane rotation="-90 0 0" width="100" height="100" color="#333"></a-plane>
    </a-scene>

    <script type="module">
        // バージョンを 10.8.0 に修正
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA", 
            authDomain: "armisetai.firebaseapp.com",
            projectId: "armisetai",
            storageBucket: "armisetai.firebasestorage.app",
            messagingSenderId: "1006973944547",
            appId: "1:1006973944547:web:adc5e195039585bbdabbd6"
        };

        // Firebase初期化（APIキーが空だとエラーになるのでtry-catchで囲む）
        try {
            const app = initializeApp(firebaseConfig);
            console.log("Firebase Initialized");
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        const textInput = document.querySelector('#textInput');
        const updateBtn = document.querySelector('#updateBtn');
        const previewText = document.querySelector('#previewText');
        const statusEl = document.querySelector('#status');

        function applyChanges() {
            const val = textInput.value;
            if (!val) return;

            statusEl.innerText = "反映中...";
            
            previewText.setAttribute('value', val);
            // 成功した設定を再適用
            previewText.setAttribute('font', './assets/fonts/mplus-msdf.json');
            previewText.setAttribute('font-image', './assets/fonts/mplus-msdf.png');
            previewText.setAttribute('shader', 'msdf');
            previewText.setAttribute('negate', 'false');

            statusEl.innerText = "反映完了: " + val;
            console.log("Updated to:", val);
        }

        updateBtn.addEventListener('click', applyChanges);
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') applyChanges();
        });

        console.log("Editor Script Loaded.");
    </script>
</body>
</html>
