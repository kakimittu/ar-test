<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AR EDITOR</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&family=Playfair+Display:wght@700&family=Caveat:wght@700&family=Aloha:wght@400&display=swap" rel="stylesheet">

<style>
@font-face{
  font-family:'CorporateMincho';
  src:url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff2'),
      url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff');
  font-display: swap;
  font-weight: normal;
  font-style: normal;
}
  
body {
  margin: 0;
  font-family: 'Noto Sans JP', 'Roboto', sans-serif;
  background: #09090b;
  color: #f4f4f5;
  overflow: hidden;
  height: 100vh;
}

#app-wrapper {
  display: flex;
  height: 100vh;
}

#controls {
  flex: 0 0 480px;
  padding: 24px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow-y: auto;
  height: 100vh;
}

/* スクロールバーのカスタマイズ */
#controls::-webkit-scrollbar {
  width: 6px;
}
#controls::-webkit-scrollbar-thumb {
  background: #27272a;
  border-radius: 3px;
}

/* タイトルスタイル */
h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: #06b6d4; /* 高級感のあるアクア */
  border-bottom: 1px solid #27272a;
  padding-bottom: 16px;
}

/* セクション（カード）ごとのまとまり */
.section-box {
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #71717a;
  margin-bottom: 4px;
  font-weight: 700;
}

/* 入力グループ */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 12px;
  font-weight: 500;
  color: #a1a1aa;
}

/* フォーム要素の共通モダンデザイン */
input[type="text"], select, input[type="color"], input[type="range"] {
  width: 100%;
  padding: 10px 12px;
  background: #202024;
  border: 1px solid #3f3f46;
  color: #fff;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 13px;
  transition: all 0.2s ease;
}

input[type="range"] {
  padding: 0;
  height: 6px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #06b6d4;
  cursor: pointer;
  transition: all 0.2s ease;
}

input[type="range"]::-webkit-slider-thumb:hover {
  background: #22d3ee;
  transform: scale(1.2);
}

input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #06b6d4;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
}

input[type="range"]::-moz-range-thumb:hover {
  background: #22d3ee;
  transform: scale(1.2);
}

input[type="text"]:focus, select:focus, input[type="color"]:focus {
  outline: none;
  border-color: #06b6d4;
  box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.15);
}

input[type="color"] {
  height: 44px;
  cursor: pointer;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 2px;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 4px;
}

/* ファイル入力のカスタム */
.file-input-wrapper {
  position: relative;
  display: inline-block;
  width: 100%;
}

input[type="file"] {
  width: 100%;
  padding: 8px;
  background: #202024;
  border: 1px dashed #3f3f46;
  color: #a1a1aa;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 12px;
  cursor: pointer;
}

input[type="file"]:hover {
  border-color: #06b6d4;
}

#fileList {
  margin-top: 4px;
  font-size: 11px;
  color: #71717a;
  text-align: right;
}

/* レイアウトプリセットボタン */
.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.preset-btn {
  padding: 10px 8px;
  background: #202024;
  border: 1px solid #3f3f46;
  color: #d4d4d8;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.preset-btn:hover {
  border-color: #06b6d4;
  color: #06b6d4;
  background: #1a2628;
}

.preset-btn.active {
  background: #06b6d4;
  border-color: #06b6d4;
  color: #09090b;
}

select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 40px;
}

select option {
  background: #202024;
  color: #fff;
}

/* 保存ボタン */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 14px;
  letter-spacing: 0.05em;
  cursor: pointer;
  margin-top: 10px;
  background: #06b6d4;
  color: #09090b;
  transition: all 0.2s ease;
}

.btn:hover {
  background: #22d3ee;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  background: #27272a;
  color: #71717a;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── プレビューパネル ── */
#preview-panel {
  flex: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0d0d0f;
  border-left: 1px solid #27272a;
  padding: 24px;
  box-sizing: border-box;
  overflow: hidden;
}

.preview-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #71717a;
  margin-bottom: 16px;
  font-weight: 700;
}

.phone-frame {
  width: 260px;
  height: 528px;
  background: #1c1c1e;
  border: 6px solid #3a3a3c;
  border-radius: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 8px 10px;
  box-sizing: border-box;
  box-shadow: 0 0 0 2px #555, 0 20px 60px rgba(0,0,0,0.8), inset 0 0 0 1px #2a2a2a;
  position: relative;
}

.phone-notch {
  width: 70px;
  height: 10px;
  background: #111;
  border-radius: 5px;
  margin-bottom: 10px;
  flex-shrink: 0;
}

.phone-screen {
  width: 100%;
  flex: 1;
  background: #050508;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.phone-home {
  width: 80px;
  height: 4px;
  background: #444;
  border-radius: 2px;
  margin-top: 10px;
  flex-shrink: 0;
}

#preview-camera-bg {
  width: 100%;
  height: 100%;
  background: #080810;
  position: relative;
  overflow: hidden;
}

#preview-camera-bg::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(0,242,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,242,255,0.025) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none;
  z-index: 1;
}

#preview-photo {
  position: absolute;
  object-fit: cover;
  display: none;
  z-index: 2;
}

#preview-bg-panel {
  position: absolute;
  border-radius: 4px;
  z-index: 3;
  transition: background 0.2s, opacity 0.2s;
}

#preview-name {
  position: absolute;
  z-index: 5;
  font-weight: bold;
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,0.8);
  pointer-events: none;
}

#preview-job {
  position: absolute;
  z-index: 5;
  font-weight: bold;
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,0.8);
  pointer-events: none;
}

.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,242,255,0.5), transparent);
  z-index: 10;
  animation: scan 3s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  0%   { top: 0;    opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

.hud-corner {
  position: absolute;
  width: 14px;
  height: 14px;
  z-index: 10;
  pointer-events: none;
}
.hud-corner.tl { top: 6px;    left: 6px;  border-top: 2px solid rgba(0,242,255,0.8); border-left: 2px solid rgba(0,242,255,0.8); }
.hud-corner.tr { top: 6px;    right: 6px; border-top: 2px solid rgba(0,242,255,0.8); border-right: 2px solid rgba(0,242,255,0.8); }
.hud-corner.bl { bottom: 6px; left: 6px;  border-bottom: 2px solid rgba(0,242,255,0.8); border-left: 2px solid rgba(0,242,255,0.8); }
.hud-corner.br { bottom: 6px; right: 6px; border-bottom: 2px solid rgba(0,242,255,0.8); border-right: 2px solid rgba(0,242,255,0.8); }

.preview-hint {
  margin-top: 14px;
  font-size: 11px;
  color: #52525b;
  text-align: center;
  line-height: 1.7;
}

@media (max-width: 900px) {
  body { overflow-y: auto; overflow-x: hidden; height: auto; }
  #app-wrapper { flex-direction: column; height: auto; }
  #controls { flex: none; width: 100%; height: auto; overflow-y: visible; }
  #preview-panel { height: 640px; border-left: none; border-top: 1px solid #27272a; flex: none; width: 100%; }
}

</style>
</head>

<body>

<div id="app-wrapper">

<div id="controls">

  <h2>AR EDITOR</h2>

<div class="section-box">
    <div class="section-title">System Settings</div>
    <div class="input-group">
      <label>ドキュメントID</label>
      <input type="text" id="markerId" value="akazawa">
    </div>

    <div class="input-group">
      <label>MindARターゲットURL (.mind)</label>
      <input type="text" id="mindUrlInput" placeholder="assets/targets/pattern-AKA2.mind">
    </div>
  </div>

  <div class="section-box">
    <div class="section-title">Profile Content</div>
    <div class="input-group">
      <label>お名前</label>
      <input type="text" id="nameInput" value="赤澤 優子">
    </div>

    <div class="input-group">
      <label>肩書き</label>
      <input type="text" id="jobInput" value="ホーストレーナー">
    </div>

    <div class="input-group">
      <label>フォント</label>
      <select id="fontSelect">
        <option value="CorporateMincho">Corporate Mincho</option>
        <option value="Noto Sans JP">Noto Sans JP</option>
        <option value="Roboto">Roboto</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Caveat">Caveat</option>
        <option value="Aloha">Aloha</option>
      </select>
    </div>

    <div class="input-group">
      <label>お名前の色</label>
      <input type="color" id="nameColorInput" value="#ffffff">
    </div>

    <div class="input-group">
      <label>肩書きの色</label>
      <input type="color" id="jobColorInput" value="#ffcc00">
    </div>

    <div class="input-group">
      <label>文字サイズ</label>
      <input type="range" id="fontSizeInput" min="40" max="150" value="80" step="5">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="fontSizeDisplay">80px</div>
    </div>

    <div class="input-group">
      <label>レイアウトプリセット</label>
      <div class="preset-grid">
        <button type="button" class="preset-btn" data-preset="top-bottom">上下配置</button>
        <button type="button" class="preset-btn" data-preset="left-right">左右配置</button>
        <button type="button" class="preset-btn" data-preset="center-stack">中央揃え（縦）</button>
        <button type="button" class="preset-btn" data-preset="diagonal">斜め配置</button>
      </div>
      <div style="font-size: 11px; color: #71717a; line-height: 1.5;">
        プリセットを押すと位置が自動設定されます。その後スライダーで微調整できます。
      </div>
    </div>

    <div class="input-group">
      <label>お名前の位置 X</label>
      <input type="range" id="nameOffsetXInput" min="-5" max="5" value="-3" step="0.5">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="nameOffsetXDisplay">-3</div>
    </div>

    <div class="input-group">
      <label>お名前の位置 Y</label>
      <input type="range" id="nameOffsetYInput" min="-2" max="2" value="1" step="0.2">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="nameOffsetYDisplay">1</div>
    </div>

    <div class="input-group">
      <label>お名前の位置 Z</label>
      <input type="range" id="nameOffsetZInput" min="-3" max="3" value="-2" step="0.3">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="nameOffsetZDisplay">-2</div>
    </div>

    <div class="input-group">
      <label>肩書きの位置 X</label>
      <input type="range" id="jobOffsetXInput" min="-5" max="5" value="3" step="0.5">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="jobOffsetXDisplay">3</div>
    </div>

    <div class="input-group">
      <label>肩書きの位置 Y</label>
      <input type="range" id="jobOffsetYInput" min="-2" max="2" value="0.5" step="0.2">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="jobOffsetYDisplay">0.5</div>
    </div>

    <div class="input-group">
      <label>肩書きの位置 Z</label>
      <input type="range" id="jobOffsetZInput" min="-3" max="3" value="2" step="0.3">

    </div>

    <div class="input-group">
      <label>背景タイプ</label>
      <select id="bgTypeInput">
        <option value="solid">単色</option>
        <option value="gradient">グラデーション</option>
        <option value="image">画像</option>
      </select>
    </div>

    <div class="input-group">
      <label>背景色</label>
      <input type="color" id="bgColorInput" value="#111827">
    </div>

    <div class="input-group">
      <label>グラデーション 1</label>
      <input type="color" id="bgGradientColor1Input" value="#111827">
    </div>

    <div class="input-group">
      <label>グラデーション 2</label>
      <input type="color" id="bgGradientColor2Input" value="#0f172a">
    </div>

    <div class="input-group">
      <label>背景画像 URL</label>
      <input type="text" id="bgImageUrlInput" placeholder="https://example.com/bg.png">
    </div>

    <div class="input-group">
      <label>背景パネル不透明度</label>
      <input type="range" id="bgOpacityInput" min="0.1" max="1" value="0.4" step="0.05">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="bgOpacityInputDisplay">0.4</div>
    </div>

    <div class="input-group">
      <label>背景パネル幅</label>
      <input type="range" id="bgWidthInput" min="1" max="8" value="4" step="0.2">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="bgWidthInputDisplay">4</div>
    </div>

    <div class="input-group">
      <label>背景パネル高さ</label>
      <input type="range" id="bgHeightInput" min="0.5" max="4" value="1.8" step="0.1">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="bgHeightInputDisplay">1.8</div>
    </div>

    <div class="input-group">
      <label>背景パネル位置 Y</label>
      <input type="range" id="bgOffsetYInput" min="-1" max="2" value="0" step="0.1">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="bgOffsetYDisplay">0</div>
    </div>

    <div class="input-group">
      <label>画像</label>
      <input type="file" id="fileInput" accept="image/*" multiple>

  </div>

  <div class="section-box">
    <div class="section-title">Social Links</div>
    <div class="input-group">
      <label>Instagram URL</label>
      <input type="text" id="instagramInput" placeholder="https://instagram.com/username">
    </div>

    <div class="input-group">
      <label>X URL</label>
      <input type="text" id="xInput" placeholder="https://x.com/username">
    </div>

    <div class="input-group">
      <label>HP URL</label>
      <input type="text" id="HPInput" placeholder="https://example.com">
    </div>

    <div class="input-group">
      <label>LINE URL</label>
      <input type="text" id="lineInput" placeholder="https://line.me/R/ti/p/...">
    </div>
  </div>

  <button id="saveBtn" class="btn">FIRESTOREへ保存</button>

</div>

<!-- スマホプレビューパネル -->
<div id="preview-panel">
  <div class="preview-label">スマホプレビュー</div>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <div id="preview-camera-bg">
        <div class="scan-line"></div>
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>
        <img id="preview-photo" src="" alt="">
        <div id="preview-bg-panel"></div>
        <div id="preview-name">名前</div>
        <div id="preview-job">肩書き</div>
      </div>
    </div>
    <div class="phone-home"></div>
  </div>
  <div class="preview-hint">スライダーを動かすと<br>リアルタイムで更新されます</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let imagesBase64=[];
let imageRatios=[];

document.getElementById("fileInput").onchange=async(e)=>{

imagesBase64=[];
imageRatios=[];

const files=[...e.target.files];

document.getElementById("fileList").innerText=files.length+"枚選択";

for(const file of files){

const result=await processImage(file);

imagesBase64.push(result.data);
imageRatios.push(result.ratio);

}

updatePreview();

};

["fontSizeInput","nameOffsetXInput","nameOffsetYInput","nameOffsetZInput","jobOffsetXInput","jobOffsetYInput","jobOffsetZInput","bgOpacityInput","bgWidthInput","bgHeightInput","bgOffsetYInput"].forEach(id=>{
const el = document.getElementById(id);
el.addEventListener("input",()=>{ updateDisplayValue(id); updatePreview(); });
});

function updateDisplayValue(id) {
  const el = document.getElementById(id);
  const displayId = id + "Display";
  const displayEl = document.getElementById(displayId);
  if (displayEl) {
    if (id === "fontSizeInput") {
      displayEl.textContent = el.value + "px";
    } else {
      displayEl.textContent = el.value;
    }
  }
}

/* ================================================
   レイアウトプリセット
   名前・肩書きのオフセット(X/Y/Z)を
   ワンクリックで分かりやすい配置にセットする
   ================================================ */
const LAYOUT_PRESETS = {
  // 名前が上、肩書きが下（写真の手前/奥に分かれる）
  "top-bottom": {
    name: { x: 0,    y: 0.6,  z: -1.2 },
    job:  { x: 0,    y: 0.6,  z: 1.2  }
  },
  // 名前が左、肩書きが右
  "left-right": {
    name: { x: -2.2, y: 0.3,  z: 0   },
    job:  { x: 2.2,  y: 0.1,  z: 0   }
  },
  // 名前・肩書きを縦に中央揃え（写真の真下にスタック）
  "center-stack": {
    name: { x: 0,    y: -1.1, z: 0   },
    job:  { x: 0,    y: -1.6, z: 0   }
  },
  // 名前を奥、肩書きを手前に斜めに配置（元のデフォルトに近い）
  "diagonal": {
    name: { x: -3,   y: 1,    z: -2  },
    job:  { x: 3,    y: 0.5,  z: 2   }
  }
};

function applyPreset(presetKey) {
  const preset = LAYOUT_PRESETS[presetKey];
  if (!preset) return;

  document.getElementById("nameOffsetXInput").value = preset.name.x;
  document.getElementById("nameOffsetYInput").value = preset.name.y;
  document.getElementById("nameOffsetZInput").value = preset.name.z;
  document.getElementById("jobOffsetXInput").value  = preset.job.x;
  document.getElementById("jobOffsetYInput").value  = preset.job.y;
  document.getElementById("jobOffsetZInput").value  = preset.job.z;

  ["nameOffsetXInput","nameOffsetYInput","nameOffsetZInput","jobOffsetXInput","jobOffsetYInput","jobOffsetZInput"]
    .forEach(updateDisplayValue);

  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.preset === presetKey);
  });

  ["nameOffsetXInput","nameOffsetYInput","nameOffsetZInput","jobOffsetXInput","jobOffsetYInput","jobOffsetZInput"]
    .forEach(updateDisplayValue);
}

document.querySelectorAll(".preset-btn").forEach(btn => {
  btn.addEventListener("click", () => { applyPreset(btn.dataset.preset); updatePreview(); });
});

// テキスト・色・フォント変更でもプレビューを更新
["nameInput","jobInput","fontSelect","nameColorInput","jobColorInput",
 "bgTypeInput","bgColorInput","bgGradientColor1Input","bgGradientColor2Input"].forEach(id=>{

  if(el) el.addEventListener("change", updatePreview);

requestAnimationFrame(updatePreview);

function processImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=e=>{

const img=new Image();

img.onload=()=>{

const canvas=document.createElement("canvas");

const maxW=800;
const ratio=img.height/img.width;

canvas.width=maxW;
canvas.height=maxW*ratio;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve({
data:canvas.toDataURL("image/jpeg",0.7),
ratio:ratio
});

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}

/* ── CSS ベースのリアルタイムプレビュー ── */
function updatePreview() {
  const screen = document.getElementById("preview-camera-bg");
  if (!screen) return;

  const screenW = screen.offsetWidth || 244;
  const screenH = screen.offsetHeight || 462;
  const cx = screenW / 2;
  const cy = screenH / 2;

  // index.html に合わせたスケール変換
  // 1 MindAR unit = 画像幅 = screenW / 1.8 px
  const pxPerUnit = screenW / 1.8;
  const S = 0.15;

  const nameVal     = document.getElementById("nameInput").value || "名前";
  const jobVal      = document.getElementById("jobInput").value  || "肩書き";
  const fontVal     = document.getElementById("fontSelect").value;
  const fontSizeVal = parseInt(document.getElementById("fontSizeInput").value) || 80;
  const nameColor   = document.getElementById("nameColorInput").value;
  const jobColor    = document.getElementById("jobColorInput").value;

  const nameOffsetX = parseFloat(document.getElementById("nameOffsetXInput").value) || 0;
  const nameOffsetZ = parseFloat(document.getElementById("nameOffsetZInput").value) || 0;
  const jobOffsetX  = parseFloat(document.getElementById("jobOffsetXInput").value)  || 0;
  const jobOffsetZ  = parseFloat(document.getElementById("jobOffsetZInput").value)  || 0;

  const bgType       = document.getElementById("bgTypeInput").value;
  const bgColor      = document.getElementById("bgColorInput").value;
  const bgGrad1      = document.getElementById("bgGradientColor1Input").value;
  const bgGrad2      = document.getElementById("bgGradientColor2Input").value;
  const bgOpacity    = parseFloat(document.getElementById("bgOpacityInput").value);
  const bgOffsetY    = parseFloat(document.getElementById("bgOffsetYInput").value) || 0;

  // index.html の座標式と同じ変換:
  //   posX = nameOffsetX * S
  //   posY = -nameOffsetZ * S  (A-Frame Y上 → 画面Y下 → 符号反転)
  const nameScreenX = cx + nameOffsetX * S * pxPerUnit;
  const nameScreenY = cy + nameOffsetZ  * S * pxPerUnit;
  const jobScreenX  = cx + jobOffsetX  * S * pxPerUnit;
  const jobScreenY  = cy + jobOffsetZ  * S * pxPerUnit;

  // プレビュー内フォントサイズ（AR 80px ≒ プレビュー 14px 相当）
  const previewFontSize = Math.max(9, Math.round(fontSizeVal * 0.175));

  const nameEl = document.getElementById("preview-name");
  nameEl.textContent      = nameVal;
  nameEl.style.color      = nameColor;
  nameEl.style.fontFamily = `"${fontVal}", sans-serif`;
  nameEl.style.fontSize   = previewFontSize + "px";
  nameEl.style.left       = nameScreenX + "px";
  nameEl.style.top        = nameScreenY + "px";
  nameEl.style.transform  = "translate(-50%, -50%)";

  const jobEl = document.getElementById("preview-job");
  jobEl.textContent      = jobVal;
  jobEl.style.color      = jobColor;
  jobEl.style.fontFamily = `"${fontVal}", sans-serif`;
  jobEl.style.fontSize   = Math.round(previewFontSize * 0.78) + "px";
  jobEl.style.left       = jobScreenX + "px";
  jobEl.style.top        = jobScreenY + "px";
  jobEl.style.transform  = "translate(-50%, -50%)";

  // 背景パネル（index.html の baseW*1.2 幅に対応）
  const ratio   = imageRatios[0] || 1;
  const bgW     = screenW * 0.9;
  const photoH  = bgW * ratio;
  const bgH     = photoH * 1.2 + screenH * 0.06;
  const bgTop   = cy - bgH / 2 + bgOffsetY * S * pxPerUnit;

  const bgEl = document.getElementById("preview-bg-panel");
  bgEl.style.width   = bgW + "px";
  bgEl.style.height  = bgH + "px";
  bgEl.style.left    = (cx - bgW / 2) + "px";
  bgEl.style.top     = bgTop + "px";
  bgEl.style.opacity = bgOpacity;
  bgEl.style.background = bgType === "gradient"
    ? `linear-gradient(135deg, ${bgGrad1}, ${bgGrad2})`
    : bgColor;

  // 写真
  const photoEl = document.getElementById("preview-photo");
  if (imagesBase64.length > 0) {
    const photoW = bgW * 0.88;
    const actualH = photoW * ratio;
    photoEl.src            = imagesBase64[0];
    photoEl.style.display  = "block";
    photoEl.style.width    = photoW + "px";
    photoEl.style.height   = actualH + "px";
    photoEl.style.left     = (cx - photoW / 2) + "px";
    photoEl.style.top      = (cy - actualH / 2) + "px";
  } else {
    photoEl.style.display = "none";
  }
}
