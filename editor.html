<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
@font-face{
    font-family:'CorporateMincho';
    src:url('assets/fonts/Corporate-Mincho-ver3.otf') format('opentype');
}

body{
    background:#111;
    color:white;
}
</style>

</head>
<body>

<h2>フォントテスト</h2>

<canvas id="c" width="1000" height="300"
style="border:1px solid white"></canvas>

<script>

async function test(){

    try{

        await document.fonts.load('80px "CorporateMincho"');

        console.log("フォント読み込み成功");

        const canvas=document.getElementById("c");
        const ctx=canvas.getContext("2d");

        ctx.fillStyle="black";
        ctx.fillRect(0,0,1000,300);

       ctx.font='80px serif';

        ctx.fillStyle="gold";

        ctx.fillText("赤澤 優子",100,120);

        ctx.fillStyle="white";

        ctx.fillText("ホーストレーナー",100,240);

    }
    catch(e){

        console.error(e);

    }

}

test();

</script>

</body>
</html>
