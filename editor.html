<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AR EDITOR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&family=Playfair+Display:wght@700&family=Caveat:wght@700&family=Aloha:wght@400&display=swap" rel="stylesheet">

<style>
@font-face{
  font-family:'CorporateMincho';
  src:url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff2'),
      url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff');
  font-display: swap;
  font-weight: normal;
  font-style: normal;
}
  
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: 'Noto Sans JP', 'Roboto', sans-serif;
  background: #09090b;
  color: #f4f4f5;
  overflow: hidden;
}

/* 左側：コントロールパネル */
#controls {
  width: 380px;
  min-width: 380px;
  padding: 24px;
  background: #121214;
  overflow-y: auto;
  border-right: 1px solid #27272a;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* スクロールバーのカスタマイズ */
#controls::-webkit-scrollbar {
  width: 6px;
}
#controls::-webkit-scrollbar-thumb {
  background: #27272a;
  border-radius: 3px;
}

/* タイトルスタイル */
h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: #06b6d4; /* 高級感のあるアクア */
  border-bottom: 1px solid #27272a;
  padding-bottom: 16px;
}

/* セクション（カード）ごとのまとまり */
.section-box {
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #71717a;
  margin-bottom: 4px;
  font-weight: 700;
}

/* 入力グループ */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 12px;
  font-weight: 500;
  color: #a1a1aa;
}

/* フォーム要素の共通モダンデザイン */
input[type="text"], select, input[type="color"], input[type="range"] {
  width: 100%;
  padding: 10px 12px;
  background: #202024;
  border: 1px solid #3f3f46;
  color: #fff;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 13px;
  transition: all 0.2s ease;
}

input[type="range"] {
  padding: 0;
  height: 6px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #06b6d4;
  cursor: pointer;
  transition: all 0.2s ease;
}

input[type="range"]::-webkit-slider-thumb:hover {
  background: #22d3ee;
  transform: scale(1.2);
}

input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #06b6d4;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
}

input[type="range"]::-moz-range-thumb:hover {
  background: #22d3ee;
  transform: scale(1.2);
}

input[type="text"]:focus, select:focus, input[type="color"]:focus {
  outline: none;
  border-color: #06b6d4;
  box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.15);
}

input[type="color"] {
  height: 44px;
  cursor: pointer;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 2px;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 4px;
}

/* ファイル入力のカスタム */
.file-input-wrapper {
  position: relative;
  display: inline-block;
  width: 100%;
}

input[type="file"] {
  width: 100%;
  padding: 8px;
  background: #202024;
  border: 1px dashed #3f3f46;
  color: #a1a1aa;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 12px;
  cursor: pointer;
}

input[type="file"]:hover {
  border-color: #06b6d4;
}

#fileList {
  margin-top: 4px;
  font-size: 11px;
  color: #71717a;
  text-align: right;
}

select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 40px;
}

select option {
  background: #202024;
  color: #fff;
}

/* 保存ボタン */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 14px;
  letter-spacing: 0.05em;
  cursor: pointer;
  margin-top: 10px;
  background: #06b6d4;
  color: #09090b;
  transition: all 0.2s ease;
}

.btn:hover {
  background: #22d3ee;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  background: #27272a;
  color: #71717a;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* 右側：プレビュー */
#preview {
  flex-grow: 1;
  background: #000;
  position: relative;
}

/* プレビューエリアに「LIVE PREVIEW」のバッジを載せてプロ感を演出 */
#preview::before {
  content: 'LIVE PREVIEW';
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  border-radius: 4px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 10;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="controls">

  <h2>AR EDITOR</h2>

  <div class="section-box">
    <div class="section-title">System Settings</div>
    <div class="input-group">
      <label>ドキュメントID</label>
      <input type="text" id="markerId" value="akazawa">
    </div>

    <div class="input-group">
      <label>マーカーパス</label>
      <input type="text" id="pattInput" value="assets/markers/pattern-AKA2.patt">
    </div>
  </div>

  <div class="section-box">
    <div class="section-title">Profile Content</div>
    <div class="input-group">
      <label>お名前</label>
      <input type="text" id="nameInput" value="赤澤 優子">
    </div>

    <div class="input-group">
      <label>肩書き</label>
      <input type="text" id="jobInput" value="ホーストレーナー">
    </div>

    <div class="input-group">
      <label>フォント</label>
      <select id="fontSelect">
        <option value="CorporateMincho">Corporate Mincho</option>
        <option value="Noto Sans JP">Noto Sans JP</option>
        <option value="Roboto">Roboto</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Caveat">Caveat</option>
        <option value="Aloha">Aloha</option>
      </select>
    </div>

    <div class="input-group">
      <label>お名前の色</label>
      <input type="color" id="nameColorInput" value="#ffffff">
    </div>

    <div class="input-group">
      <label>肩書きの色</label>
      <input type="color" id="jobColorInput" value="#ffcc00">
    </div>

    <div class="input-group">
      <label>文字サイズ</label>
      <input type="range" id="fontSizeInput" min="40" max="150" value="80" step="5">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="fontSizeDisplay">80px</div>
    </div>

    <div class="input-group">
      <label>お名前の位置 X</label>
      <input type="range" id="nameOffsetXInput" min="-5" max="5" value="-3" step="0.5">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="nameOffsetXDisplay">-3</div>
    </div>

    <div class="input-group">
      <label>お名前の位置 Y</label>
      <input type="range" id="nameOffsetYInput" min="-2" max="2" value="1" step="0.2">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="nameOffsetYDisplay">1</div>
    </div>

    <div class="input-group">
      <label>お名前の位置 Z</label>
      <input type="range" id="nameOffsetZInput" min="-3" max="3" value="-2" step="0.3">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="nameOffsetZDisplay">-2</div>
    </div>

    <div class="input-group">
      <label>肩書きの位置 X</label>
      <input type="range" id="jobOffsetXInput" min="-5" max="5" value="3" step="0.5">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="jobOffsetXDisplay">3</div>
    </div>

    <div class="input-group">
      <label>肩書きの位置 Y</label>
      <input type="range" id="jobOffsetYInput" min="-2" max="2" value="0.5" step="0.2">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="jobOffsetYDisplay">0.5</div>
    </div>

    <div class="input-group">
      <label>肩書きの位置 Z</label>
      <input type="range" id="jobOffsetZInput" min="-3" max="3" value="2" step="0.3">
      <div style="font-size: 11px; color: #71717a; text-align: right;" id="jobOffsetZDisplay">2</div>
    </div>

    <div class="input-group">
      <label>画像</label>
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div id="fileList">未選択</div>
    </div>
  </div>

  <div class="section-box">
    <div class="section-title">Social Links</div>
    <div class="input-group">
      <label>Instagram URL</label>
      <input type="text" id="instagramInput" placeholder="https://instagram.com/username">
    </div>

    <div class="input-group">
      <label>X URL</label>
      <input type="text" id="xInput" placeholder="https://x.com/username">
    </div>

    <div class="input-group">
      <label>HP URL</label>
      <input type="text" id="HPInput" placeholder="https://example.com">
    </div>

    <div class="input-group">
      <label>LINE URL</label>
      <input type="text" id="lineInput" placeholder="https://line.me/R/ti/p/...">
    </div>
  </div>

  <button id="saveBtn" class="btn">FIRESTOREへ保存</button>

</div>

<div id="preview">

<a-scene embedded vr-mode-ui="enabled:false">

<a-entity position="0 6 1" rotation="-85 0 0">
<a-entity camera></a-entity>
</a-entity>

<a-light type="ambient" intensity="1"></a-light>

<a-plane
color="#333"
width="10"
height="10"
rotation="-90 0 0"
material="opacity:0.1;transparent:true">
</a-plane>

<a-entity id="dynamic-content"></a-entity>

</a-scene>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let imagesBase64=[];
let imageRatios=[];

document.getElementById("fileInput").onchange=async(e)=>{

imagesBase64=[];
imageRatios=[];

const files=[...e.target.files];

document.getElementById("fileList").innerText=files.length+"枚選択";

for(const file of files){

const result=await processImage(file);

imagesBase64.push(result.data);
imageRatios.push(result.ratio);

}

updatePreview();

};

["nameInput","jobInput","fontSelect","nameColorInput","jobColorInput","fontSizeInput","nameOffsetXInput","nameOffsetYInput","nameOffsetZInput","jobOffsetXInput","jobOffsetYInput","jobOffsetZInput"].forEach(id=>{
const el = document.getElementById(id);
el.addEventListener("input",()=>{
  updateDisplayValue(id);
  updatePreview();
});
el.addEventListener("change",updatePreview);
});

function updateDisplayValue(id) {
  const el = document.getElementById(id);
  const displayId = id + "Display";
  const displayEl = document.getElementById(displayId);
  if (displayEl) {
    if (id === "fontSizeInput") {
      displayEl.textContent = el.value + "px";
    } else {
      displayEl.textContent = el.value;
    }
  }
}

function processImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=e=>{

const img=new Image();

img.onload=()=>{

const canvas=document.createElement("canvas");

const maxW=800;
const ratio=img.height/img.width;

canvas.width=maxW;
canvas.height=maxW*ratio;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve({
data:canvas.toDataURL("image/jpeg",0.7),
ratio:ratio
});

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}

/**
 * フォント読み込み完了を待機する関数
 * @param {string} fontFamily - フォントファミリー名
 */
async function waitForFont(fontFamily) {
  try {
    // フォントが読み込まれるまで待機（最大10秒）
    const fontLoaded = await Promise.race([
      document.fonts.load(`bold 80px "${fontFamily}"`),
      new Promise((_, reject) => 
        setTimeout(() => reject(new Error('Font load timeout')), 10000)
      )
    ]);
    console.log(`✓ フォント "${fontFamily}" の読み込み完了`);
  } catch (e) {
    console.warn(`⚠ フォント "${fontFamily}" の読み込みに失敗: ${e.message}`);
  }
}

/**
 * テキストを画像に変換する関数
 * @param {string} text - 表示テキスト
 * @param {string} color - テキスト色
 * @param {string} fontFamily - フォントファミリー名
 * @param {number} fontSize - フォントサイズ
 */
async function createTextImage(text, color, fontFamily, fontSize = 80) {

  // フォント読み込み完了を待つ
  await waitForFont(fontFamily);

  return new Promise(resolve => {

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 1024;
    canvas.height = 256;

    ctx.clearRect(0, 0, 1024, 256);

    ctx.fillStyle = color;

    // フォント読み込み完了後に設定
    ctx.font = `bold ${fontSize}px "${fontFamily}", sans-serif`;

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 10;

    console.log(`📝 キャンバスに描画: "${text}" | フォント: ${fontFamily} | サイズ: ${fontSize}px`);

    ctx.fillText(
      text,
      canvas.width / 2,
      canvas.height / 2
    );

    resolve(canvas.toDataURL("image/png"));

  });

}

/**
 * プレビューを更新する関数
 */
async function updatePreview(){

  const container = document.getElementById("dynamic-content");
  container.innerHTML = "";

  const nameVal = document.getElementById("nameInput").value || "NAME";
  const jobVal = document.getElementById("jobInput").value || "JOB";
  const fontVal = document.getElementById("fontSelect").value;
  const fontSizeVal = parseInt(document.getElementById("fontSizeInput").value) || 80;
  const nameColorVal = document.getElementById("nameColorInput").value || "#ffffff";
  const jobColorVal = document.getElementById("jobColorInput").value || "#ffcc00";
  
  const nameOffsetX = parseFloat(document.getElementById("nameOffsetXInput").value) || -3;
  const nameOffsetY = parseFloat(document.getElementById("nameOffsetYInput").value) || 1;
  const nameOffsetZ = parseFloat(document.getElementById("nameOffsetZInput").value) || -2;
  const jobOffsetX = parseFloat(document.getElementById("jobOffsetXInput").value) || 3;
  const jobOffsetY = parseFloat(document.getElementById("jobOffsetYInput").value) || 0.5;
  const jobOffsetZ = parseFloat(document.getElementById("jobOffsetZInput").value) || 2;

  // フォント読み込み完了を待機してからテキスト画像を生成
  const nameImg = await createTextImage(nameVal, nameColorVal, fontVal, fontSizeVal);
  const jobImg = await createTextImage(jobVal, jobColorVal, fontVal, fontSizeVal);

  const count = imagesBase64.length > 0 ? imagesBase64.length : 1;

  for(let i = 0; i < count; i++){

    const entity = document.createElement("a-entity");

    let posX = (i === 0) ? 0 : (i % 2 === 1 ? Math.ceil(i / 2) * 4 : Math.ceil(i / 2) * -4);

    entity.setAttribute("position", `${posX} 0 0`);

    if(imagesBase64[i]){

      const img = document.createElement("a-image");

      img.setAttribute("src", imagesBase64[i]);
      img.setAttribute("rotation", "-90 0 0");

      const ratio = imageRatios[i] || 1;

      img.setAttribute("width", 2.5);
      img.setAttribute("height", 2.5 * ratio);

      entity.appendChild(img);

    }

    const nameImage = document.createElement("a-image");

    nameImage.setAttribute("src", nameImg);
    const nameWidth = 4 * (fontSizeVal / 80);
    const nameHeight = 1 * (fontSizeVal / 80);
    nameImage.setAttribute("width", nameWidth);
    nameImage.setAttribute("height", nameHeight);
    nameImage.setAttribute("rotation", "-90 0 0");
    nameImage.setAttribute("position", `${nameOffsetX} ${nameOffsetY} ${nameOffsetZ}`);

    entity.appendChild(nameImage);

    const jobImage = document.createElement("a-image");

    jobImage.setAttribute("src", jobImg);
    const jobWidth = 4 * (fontSizeVal / 80);
    const jobHeight = 1 * (fontSizeVal / 80);
    jobImage.setAttribute("width", jobWidth);
    jobImage.setAttribute("height", jobHeight);
    jobImage.setAttribute("rotation", "-90 0 0");
    jobImage.setAttribute("position", `${jobOffsetX} ${jobOffsetY} ${jobOffsetZ}`);

    entity.appendChild(jobImage);

    container.appendChild(entity);

  }

}

window.onload = () => {
  console.log("🚀 AR EDITOR 初期化開始");
  updatePreview();
};

document.getElementById("saveBtn").onclick = async() => {

  const markerId = document.getElementById("markerId").value;

  const saveBtn = document.getElementById("saveBtn");

  saveBtn.disabled = true;
  saveBtn.innerText = "保存中...";

  try{

    await setDoc(doc(db, "arUsers", markerId), {

      images: imagesBase64,
      ratios: imageRatios,

      name: document.getElementById("nameInput").value,
      job: document.getElementById("jobInput").value,

      font: document.getElementById("fontSelect").value,
      fontSize: parseInt(document.getElementById("fontSizeInput").value),
      nameColor: document.getElementById("nameColorInput").value,
      jobColor: document.getElementById("jobColorInput").value,
      
      nameOffsetX: parseFloat(document.getElementById("nameOffsetXInput").value),
      nameOffsetY: parseFloat(document.getElementById("nameOffsetYInput").value),
      nameOffsetZ: parseFloat(document.getElementById("nameOffsetZInput").value),
      jobOffsetX: parseFloat(document.getElementById("jobOffsetXInput").value),
      jobOffsetY: parseFloat(document.getElementById("jobOffsetYInput").value),
      jobOffsetZ: parseFloat(document.getElementById("jobOffsetZInput").value),

      pattUrl: document.getElementById("pattInput").value,

      instagram: document.getElementById("instagramInput")?.value || "",
      x: document.getElementById("xInput")?.value || "",
      youtube: document.getElementById("HPInput")?.value || "",
      line: document.getElementById("lineInput")?.value || ""

    });

    alert("✓ 保存完了しました");
    console.log("💾 Firestore 保存完了");

  }catch(e){

    alert("✗ エラー：" + e.message);
    console.error("❌ 保存エラー:", e);

  }

  saveBtn.disabled = false;
  saveBtn.innerText = "FIRESTOREへ保存";

};

</script>

</body>
</html>
