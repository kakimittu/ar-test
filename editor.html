<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR名刺</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body {
margin:0;
overflow:hidden;
}
</style>

</head>

<body>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
renderer="logarithmicDepthBuffer: true;"
>

<a-assets>

<img id="photo" src="assets/photo.png">

</a-assets>

<a-marker preset="hiro">

<!-- 名刺背景 -->

<a-plane
position="0 0 0"
width="2"
height="1.2"
color="#ffffff"
material="side:double"
animation="property: scale; from:0 0 0; to:1 1 1; dur:800; easing:easeOutBack"
>
</a-plane>

<!-- 写真 -->

<a-image
src="#photo"
position="-0.6 0.1 0.01"
width="0.6"
height="0.6"
material="transparent:true; side:double"
>
</a-image>

<!-- 名前 -->

<a-text
value="山田 太郎"
color="#000000"
align="left"
width="2"
position="0.1 0.3 0.01"
material="transparent:true"
>
</a-text>

<!-- 会社 -->

<a-text
value="AR Creative Studio"
color="#333333"
align="left"
width="2"
position="0.1 0.05 0.01"
material="transparent:true"
>
</a-text>

<!-- 説明 -->

<a-text
value="AR Developer"
color="#555555"
align="left"
width="2"
position="0.1 -0.15 0.01"
material="transparent:true"
>
</a-text>

<!-- クリックエリア -->

<a-plane
position="0 -0.45 0.02"
width="1.4"
height="0.25"
color="#0066ff"
class="clickable"
event-set__enter="_event: mouseenter; color:#0099ff"
event-set__leave="_event: mouseleave; color:#0066ff"
onclick="window.open('https://example.com')"
>

<a-text
value="WEBSITE"
align="center"
color="#ffffff"
width="3"
position="0 0 0.01"
>
</a-text>

</a-plane>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
