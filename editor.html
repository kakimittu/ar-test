<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AR EDITOR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&family=Playfair+Display:wght@700&family=Caveat:wght@700&family=Aloha:wght@400&display=swap" rel="stylesheet">

<style>
@font-face{
  font-family:'CorporateMincho';
  src:url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff2'),
      url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff');
  font-display: swap;
  font-weight: normal;
  font-style: normal;
}
  
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: 'Noto Sans JP', 'Roboto', sans-serif;
  background: #09090b;
  color: #f4f4f5;
  overflow: hidden;
}

/* 左側：コントロールパネル */
#controls {
  width: 380px;
  min-width: 380px;
  padding: 24px;
  background: #121214;
  overflow-y: auto;
  border-right: 1px solid #27272a;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* スクロールバーのカスタマイズ */
#controls::-webkit-scrollbar {
  width: 6px;
}
#controls::-webkit-scrollbar-thumb {
  background: #27272a;
  border-radius: 3px;
}

/* タイトルスタイル */
h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: #06b6d4; /* 高級感のあるアクア */
  border-bottom: 1px solid #27272a;
  padding-bottom: 16px;
}

/* セクション（カード）ごとのまとまり */
.section-box {
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #71717a;
  margin-bottom: 4px;
  font-weight: 700;
}

/* 入力グループ */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 12px;
  font-weight: 500;
  color: #a1a1aa;
}

/* フォーム要素の共通モダンデザイン */
input[type="text"], select, input[type="color"], input[type="range"] {
  width: 100%;
  padding: 10px 12px;
  background: #202024;
  border: 1px solid #3f3f46;
  color: #fff;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 13px;
  transition: all 0.2s ease;
}

input[type="range"] {
  padding: 0;
  height: 6px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #06b6d4;
  cursor: pointer;
  transition: all 0.2s ease;
}

input[type="range"]::-webkit-slider-thumb:hover {
  background: #22d3ee;
  transform: scale(1.2);
}

input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #06b6d4;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
}

input[type="range"]::-moz-range-thumb:hover {
  background: #22d3ee;
  transform: scale(1.2);
}

input[type="text"]:focus, select:focus, input[type="color"]:focus {
  outline: none;
  border-color: #06b6d4;
  box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.15);
}

input[type="color"] {
  height: 44px;
  cursor: pointer;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 2px;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 4px;
}

/* ファイル入力のカスタム */
.file-input-wrapper {
  position: relative;
  display: inline-block;
  width: 100%;
}

input[type="file"] {
  width: 100%;
  padding: 8px;
  background: #202024;
  border: 1px dashed #3f3f46;
  color: #a1a1aa;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 12px;
  cursor: pointer;
}

input[type="file"]:hover {
  border-color: #06b6d4;
}

#fileList {
  margin-top: 4px;
  font-size: 11px;
  color: #71717a;
  text-align: right;
}

/* レイアウトプリセットボタン */
.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.preset-btn {
  padding: 10px 8px;
  background: #202024;
  border: 1px solid #3f3f46;
  color: #d4d4d8;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.preset-btn:hover {
  border-color: #06b6d4;
  color: #06b6d4;
  background: #1a2628;
}

.preset-btn.active {
  background: #06b6d4;
  border-color: #06b6d4;
  color: #09090b;
}

select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 40px;
}

select option {
  background: #202024;
  color: #fff;
}

/* 保存ボタン */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 14px;
  letter-spacing: 0.05em;
  cursor: pointer;
  margin-top: 10px;
  background: #06b6d4;
  color: #09090b;
  transition: all 0.2s ease;
}

.btn:hover {
  background: #22d3ee;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  background: #27272a;
  color: #71717a;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* 右側：プレビュー */
#preview {
  flex-grow: 1;
  background: #000;
  position: relative;
}

/* プレビューエリアに「LIVE PREVIEW」のバッジを載せてプロ感を演出 */
#preview::before {
  content: 'LIVE PREVIEW';
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  border-radius: 4px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 10;
  pointer-events: none;
}

/* ログイン画面 */
#login-overlay {
  position: fixed;
  inset: 0;
  background: #09090b;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#login-overlay.hidden { display: none; }

#login-box {
  width: 320px;
  background: #18181b;
  border: 1px solid #27272a;
  border-radius: 10px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

#login-box h3 {
  margin: 0 0 4px 0;
  color: #06b6d4;
  font-size: 16px;
  letter-spacing: 0.05em;
}

#login-error {
  font-size: 12px;
  color: #f87171;
  min-height: 14px;
}

/* 編集画面本体（ログイン前は隠す） */
#app-wrapper.hidden { display: none; }
</style>
</head>

<body>

<!-- ログイン画面：認証されるまでこれだけが表示される -->

    <div class="input-group">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

/* ================================================
   ログインゲート
   ・認証されていない人には編集画面を一切見せない
   ・Firestore側のセキュリティルールでも書き込みを
     「ログイン済みのみ」に制限することが必須（後述）
   ================================================ */
const loginOverlay = document.getElementById("login-overlay");
const appWrapper   = document.getElementById("app-wrapper");
const loginError   = document.getElementById("login-error");

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginOverlay.classList.add("hidden");
    appWrapper.classList.remove("hidden");
  } else {
    loginOverlay.classList.remove("hidden");
    appWrapper.classList.add("hidden");
  }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  loginError.textContent = "";

  if (!email || !password) {
    loginError.textContent = "メールアドレスとパスワードを入力してください";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    loginError.textContent = "ログインに失敗しました（メールアドレスまたはパスワードが違います）";
    console.error("ログインエラー:", e);
  }
});

// Enterキーでもログインできるように
document.getElementById("loginPassword").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});

document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

let imagesBase64=[];
let imageRatios=[];

document.getElementById("fileInput").onchange=async(e)=>{

imagesBase64=[];
imageRatios=[];

const files=[...e.target.files];

document.getElementById("fileList").innerText=files.length+"枚選択";

for(const file of files){

const result=await processImage(file);

imagesBase64.push(result.data);
imageRatios.push(result.ratio);

}

updatePreview();

};

["nameInput","jobInput","fontSelect","nameColorInput","jobColorInput","fontSizeInput","nameOffsetXInput","nameOffsetYInput","nameOffsetZInput","jobOffsetXInput","jobOffsetYInput","jobOffsetZInput","bgTypeInput","bgColorInput","bgGradientColor1Input","bgGradientColor2Input","bgImageUrlInput","bgOpacityInput","bgWidthInput","bgHeightInput","bgOffsetYInput"].forEach(id=>{
const el = document.getElementById(id);
el.addEventListener("input",()=>{
  updateDisplayValue(id);
  updatePreview();
});
el.addEventListener("change",updatePreview);
});

function updateDisplayValue(id) {
  const el = document.getElementById(id);
  const displayId = id + "Display";
  const displayEl = document.getElementById(displayId);
  if (displayEl) {
    if (id === "fontSizeInput") {
      displayEl.textContent = el.value + "px";
    } else {
      displayEl.textContent = el.value;
    }
  }
}

/* ================================================
   レイアウトプリセット
   名前・肩書きのオフセット(X/Y/Z)を
   ワンクリックで分かりやすい配置にセットする
   ================================================ */
const LAYOUT_PRESETS = {
  // 名前が上、肩書きが下（写真の手前/奥に分かれる）
  "top-bottom": {
    name: { x: 0,    y: 0.6,  z: -1.2 },
    job:  { x: 0,    y: 0.6,  z: 1.2  }
  },
  // 名前が左、肩書きが右
  "left-right": {
    name: { x: -2.2, y: 0.3,  z: 0   },
    job:  { x: 2.2,  y: 0.1,  z: 0   }
  },
  // 名前・肩書きを縦に中央揃え（写真の真下にスタック）
  "center-stack": {
    name: { x: 0,    y: -1.1, z: 0   },
    job:  { x: 0,    y: -1.6, z: 0   }
  },
  // 名前を奥、肩書きを手前に斜めに配置（元のデフォルトに近い）
  "diagonal": {
    name: { x: -3,   y: 1,    z: -2  },
    job:  { x: 3,    y: 0.5,  z: 2   }
  }
};

function applyPreset(presetKey) {
  const preset = LAYOUT_PRESETS[presetKey];
  if (!preset) return;

  document.getElementById("nameOffsetXInput").value = preset.name.x;
  document.getElementById("nameOffsetYInput").value = preset.name.y;
  document.getElementById("nameOffsetZInput").value = preset.name.z;
  document.getElementById("jobOffsetXInput").value  = preset.job.x;
  document.getElementById("jobOffsetYInput").value  = preset.job.y;
  document.getElementById("jobOffsetZInput").value  = preset.job.z;

  ["nameOffsetXInput","nameOffsetYInput","nameOffsetZInput","jobOffsetXInput","jobOffsetYInput","jobOffsetZInput"]
    .forEach(updateDisplayValue);

  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.preset === presetKey);
  });

  updatePreview();
}

function processImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=e=>{

const img=new Image();

img.onload=()=>{

const canvas=document.createElement("canvas");

const maxW=800;
const ratio=img.height/img.width;

canvas.width=maxW;
canvas.height=maxW*ratio;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve({
data:canvas.toDataURL("image/jpeg",0.7),
ratio:ratio
});

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}

/**
 * フォント読み込み完了を待機する関数
 * @param {string} fontFamily - フォントファミリー名
 */
async function waitForFont(fontFamily) {
  try {
    // フォントが読み込まれるまで待機（最大10秒）
    const fontLoaded = await Promise.race([
      document.fonts.load(`bold 80px "${fontFamily}"`),
      new Promise((_, reject) => 
        setTimeout(() => reject(new Error('Font load timeout')), 10000)
      )
    ]);
    console.log(`✓ フォント "${fontFamily}" の読み込み完了`);
  } catch (e) {
    console.warn(`⚠ フォント "${fontFamily}" の読み込みに失敗: ${e.message}`);
  }
}

/**
 * テキストを画像に変換する関数
 * @param {string} text - 表示テキスト
 * @param {string} color - テキスト色
 * @param {string} fontFamily - フォントファミリー名
 * @param {number} fontSize - フォントサイズ
 */
async function createTextImage(text, color, fontFamily, fontSize = 80) {

  // フォント読み込み完了を待つ
  await waitForFont(fontFamily);

  return new Promise(resolve => {

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 1024;
    canvas.height = 256;

    ctx.clearRect(0, 0, 1024, 256);

    ctx.fillStyle = color;

    // 文字が長い場合は自動的にサイズを縮小して全部表示する
    const padding = 40; // 左右の余白
    const maxWidth = canvas.width - padding * 2;
    let size = fontSize;
    const minSize = 28; // これ以上は縮小しない下限

    while (size > minSize) {
      ctx.font = `bold ${size}px "${fontFamily}", sans-serif`;
      if (ctx.measureText(text).width <= maxWidth) break;
      size -= 2;
    }

    ctx.font = `bold ${size}px "${fontFamily}", sans-serif`;

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 10;

    console.log(`📝 キャンバスに描画: "${text}" | フォント: ${fontFamily} | 指定サイズ: ${fontSize}px → 実サイズ: ${size}px`);

    ctx.fillText(
      text,
      canvas.width / 2,
      canvas.height / 2,
      maxWidth
    );

    resolve(canvas.toDataURL("image/png"));

  });

}

/**
 * プレビューを更新する関数
 */
async function updatePreview(){

  const container = document.getElementById("dynamic-content");
  container.innerHTML = "";

  const nameVal = document.getElementById("nameInput").value || "NAME";
  const jobVal = document.getElementById("jobInput").value || "JOB";
  const fontVal = document.getElementById("fontSelect").value;
  const fontSizeVal = parseInt(document.getElementById("fontSizeInput").value) || 80;
  const nameColorVal = document.getElementById("nameColorInput").value || "#ffffff";
  const jobColorVal = document.getElementById("jobColorInput").value || "#ffcc00";
  
  const nameOffsetX = parseFloat(document.getElementById("nameOffsetXInput").value) || -3;
  const nameOffsetY = parseFloat(document.getElementById("nameOffsetYInput").value) || 1;
  const nameOffsetZ = parseFloat(document.getElementById("nameOffsetZInput").value) || -2;
  const jobOffsetX = parseFloat(document.getElementById("jobOffsetXInput").value) || 3;
  const jobOffsetY = parseFloat(document.getElementById("jobOffsetYInput").value) || 0.5;
  const jobOffsetZ = parseFloat(document.getElementById("jobOffsetZInput").value) || 2;
  const bgTypeVal = document.getElementById("bgTypeInput").value || "solid";
  const bgColorVal = document.getElementById("bgColorInput").value || "#111827";
  const bgGradientColor1Val = document.getElementById("bgGradientColor1Input").value || "#111827";
  const bgGradientColor2Val = document.getElementById("bgGradientColor2Input").value || "#0f172a";
  const bgImageUrlVal = document.getElementById("bgImageUrlInput").value || "";
  const bgOpacityVal = parseFloat(document.getElementById("bgOpacityInput").value) || 0.4;
  const bgWidthVal = parseFloat(document.getElementById("bgWidthInput").value) || 4;
  const bgHeightVal = parseFloat(document.getElementById("bgHeightInput").value) || 1.8;
  const bgOffsetYVal = parseFloat(document.getElementById("bgOffsetYInput").value) || 0;

  // フォント読み込み完了を待機してからテキスト画像を生成
  const nameImg = await createTextImage(nameVal, nameColorVal, fontVal, fontSizeVal);
  const jobImg = await createTextImage(jobVal, jobColorVal, fontVal, fontSizeVal);

  const count = imagesBase64.length > 0 ? imagesBase64.length : 1;
  const previewBgWidth = Math.max(bgWidthVal, count * 3);
  const background = document.createElement("a-plane");
  background.setAttribute("width", previewBgWidth);
  background.setAttribute("height", bgHeightVal);
  background.setAttribute("rotation", "-90 0 0");
  background.setAttribute("position", `0 ${bgOffsetYVal - 0.05} 0`);
  background.setAttribute("material", {
    shader: "flat",
    transparent: true,
    opacity: bgOpacityVal
  });

  if(bgTypeVal === "solid"){
    background.setAttribute("material", {
      shader: "flat",
      transparent: true,
      opacity: bgOpacityVal,
      color: bgColorVal
    });
  } else {
    const bgTexture = await createBackgroundTexture(bgTypeVal, bgColorVal, bgGradientColor1Val, bgGradientColor2Val, bgImageUrlVal);
    background.setAttribute("material", {
      src: bgTexture,
      shader: "flat",
      transparent: true,
      opacity: bgOpacityVal
    });
  }

  container.appendChild(background);

  for(let i = 0; i < count; i++){

    const entity = document.createElement("a-entity");

    let posX = (i === 0) ? 0 : (i % 2 === 1 ? Math.ceil(i / 2) * 4 : Math.ceil(i / 2) * -4);

    entity.setAttribute("position", `${posX} 0 0`);

    if(imagesBase64[i]){

      const img = document.createElement("a-image");

      img.setAttribute("src", imagesBase64[i]);
      img.setAttribute("rotation", "-90 0 0");

      const ratio = imageRatios[i] || 1;

      img.setAttribute("width", 2.5);
      img.setAttribute("height", 2.5 * ratio);

      entity.appendChild(img);

    }

    const nameImage = document.createElement("a-image");

    nameImage.setAttribute("src", nameImg);
    const nameWidth = 4 * (fontSizeVal / 80);
    const nameHeight = 1 * (fontSizeVal / 80);
    nameImage.setAttribute("width", nameWidth);
    nameImage.setAttribute("height", nameHeight);
    nameImage.setAttribute("rotation", "-90 0 0");
    nameImage.setAttribute("position", `${nameOffsetX} ${nameOffsetY} ${nameOffsetZ}`);

    entity.appendChild(nameImage);

    const jobImage = document.createElement("a-image");

    jobImage.setAttribute("src", jobImg);
    const jobWidth = 4 * (fontSizeVal / 80);
    const jobHeight = 1 * (fontSizeVal / 80);
    jobImage.setAttribute("width", jobWidth);
    jobImage.setAttribute("height", jobHeight);
    jobImage.setAttribute("rotation", "-90 0 0");
    jobImage.setAttribute("position", `${jobOffsetX} ${jobOffsetY} ${jobOffsetZ}`);

    entity.appendChild(jobImage);

    container.appendChild(entity);

  }

}

async function createBackgroundTexture(type, color, gradient1, gradient2, imageUrl) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 1024;
  canvas.height = 1024;

  if(type === "gradient"){
    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, gradient1);
    grad.addColorStop(1, gradient2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else if(type === "image" && imageUrl){
    const img = new Image();
    img.crossOrigin = "anonymous";
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = () => reject(new Error("背景画像の読み込みに失敗しました"));
      img.src = imageUrl;
    });
    const aspect = img.width / img.height;
    let drawWidth = canvas.width;
    let drawHeight = canvas.height;
    if(aspect > 1) drawHeight = canvas.width / aspect;
    else drawWidth = canvas.height * aspect;
    const offsetX = (canvas.width - drawWidth) / 2;
    const offsetY = (canvas.height - drawHeight) / 2;
    ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
  } else {
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  return canvas.toDataURL("image/png");
}
