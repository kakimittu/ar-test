<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FONT CHECK FINAL</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; background-color: #000;">

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-entity camera position="0 0 5"></a-entity>

<a-text 
    value="日本語テスト成功" 
    font="assets/fonts/mplus-msdf.json"
    font-image="assets/fonts/mplus-msdf.png"
    shader="msdf" 
    negate="true"
    side="double"
    color="#00f2ff" 
    width="10" 
    position="0 0 -3" 
    align="center">
</a-text>

        <a-sky color="#222"></a-sky>
        <a-box position="0 0 -1" scale="10 2 0.1" color="#444"></a-box>
    </a-scene>

    <script type="module">
        console.log("Module mode active.");
    </script>
</body>
</html>
