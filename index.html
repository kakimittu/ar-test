<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&family=Playfair+Display:wght@700&family=Caveat:wght@700&family=Aloha:wght@400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:#000;
}

@font-face{
  font-family:'CorporateMincho';
  src:url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff2'),
      url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff');
  font-display: swap;
  font-weight: normal;
  font-style: normal;
}

.hud{
position:fixed;
top:20px;
left:20px;
color:#00f2ff;
font-family:monospace;
font-size:12px;
pointer-events:none;
z-index:10001;
text-shadow:0 0 5px #00f2ff;

.rec-dot{
display:inline-block;
width:10px;
height:10px;
background:red;
border-radius:50%;
margin-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}


/* SNS */

.sns-container{
position:fixed;
bottom:25px;
right:25px;
display:flex;
flex-direction:row-reverse;
gap:20px;
z-index:10002;
}

#insta-link,
#x-link,
#line-link{
display:none;
}

.btn-border-shadow{
position:relative;
display:flex;
justify-content:center;
align-items:center;
width:50px;
height:50px;
cursor:pointer;
text-decoration:none;
background:rgba(255,255,255,0.85);
border-radius:50%;
}

.btn-border-shadow:before{
position:absolute;
top:-6px;
left:-6px;
width:100%;
height:100%;
content:"";
transition:all .3s ease;
border:3px solid #000;
border-radius:50%;
box-shadow:3px 3px 0 #78e5e5;
box-sizing:content-box;
}

.btn-border-shadow:hover{
transform:translate(-3px,-3px);
}

.btn-border-shadow:hover:before{
top:0;
left:0;
box-shadow:0 0 0 #78e5e5;
}

.btn-border-shadow img{
width:60%;
height:60%;
object-fit:contain;
z-index:1;
}

</style>
</head>

<body>

<div class="hud"></div>


<div class="sns-container">

<a href="#" id="line-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/LINE.png">
</a>

<a href="#" id="x-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/X.png">
</a>

<a href="#" id="insta-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/instagram.png">
</a>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

// MindARのデフォルトtargetファイル（assets/targets/に.mindファイルを配置）
const DEFAULT_MIND_URL="assets/targets/pattern-AKA2.mind";

let currentIndex=0;
let items=[];
let arTarget=null;
let sceneInitialized=false;


/* 日本語Canvas */

async function createTextTexture(text,color,fontSize="50px",fontFamily="sans-serif"){

  const canvas=document.createElement("canvas");
  canvas.width=512;
  canvas.height=128;

  const ctx=canvas.getContext("2d");

  try{
    await document.fonts.load(`bold ${fontSize} "${fontFamily}"`);
  }catch(e){}

  ctx.clearRect(0,0,512,128);
  ctx.fillStyle=color;
  ctx.font=`bold ${fontSize} "${fontFamily}", sans-serif`;
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(text,256,64);

  return canvas.toDataURL();

}

async function createBackgroundTexture(type,color,gradient1,gradient2,imageUrl){
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=1024;
  canvas.height=1024;

  if(type==="gradient"){
    const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0,gradient1);
    grad.addColorStop(1,gradient2);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else if(type==="image" && imageUrl){
    const img=new Image();
    img.crossOrigin="anonymous";
    await new Promise((resolve,reject)=>{
      img.onload=resolve;
      img.onerror=()=>reject(new Error("背景画像の読み込みに失敗しました"));
      img.src=imageUrl;
    });
    const aspect=img.width/img.height;
    let drawW=canvas.width;
    let drawH=canvas.height;
    if(aspect>1){
      drawH=canvas.width/aspect;
    } else {
      drawW=canvas.height*aspect;
    }
    const ox=(canvas.width-drawW)/2;
    const oy=(canvas.height-drawH)/2;
    ctx.drawImage(img,ox,oy,drawW,drawH);
  } else {
    ctx.fillStyle=color;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  return canvas.toDataURL("image/png");
}


/* MindAR シーン初期化 */

function initARScene(mindUrl){

  const scene=document.createElement("a-scene");

  scene.setAttribute("mindar-image","imageTargetSrc: "+mindUrl+"; autoStart: true; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;");
  scene.setAttribute("vr-mode-ui","enabled: false");
  scene.setAttribute("device-orientation-permission-ui","enabled: false");

  const camera=document.createElement("a-camera");
  camera.setAttribute("position","0 0 0");
  camera.setAttribute("look-controls","enabled: false");
  scene.appendChild(camera);

  arTarget=document.createElement("a-entity");
  arTarget.setAttribute("mindar-image-target","targetIndex: 0");
  scene.appendChild(arTarget);

  document.body.appendChild(scene);
  sceneInitialized=true;

}


/* カルーセル更新 */

function updateCarousel(){

  items.forEach((item,index)=>{

    const isCenter=(index===currentIndex);
    const offset=(index-currentIndex)*2.6;

    item.setAttribute("visible",Math.abs(index-currentIndex)<=1?"true":"false");
    item.setAttribute("position",`${offset} 0 0`);
    item.setAttribute("scale",isCenter?"1 1 1":"0.75 0.75 0.75");

  });

}


window.addEventListener("load",()=>{

const urlParams=new URLSearchParams(window.location.search);
const markerId=urlParams.get("id")||"akazawa";

const hud=document.querySelector(".hud");
hud.innerHTML=`<div class="rec-dot"></div>REC AR ACTIVE<br>USER:${markerId}`;

const editBtn=document.createElement('a');
editBtn.href=`editor.html?id=${markerId}`;
editBtn.textContent='EDIT';
editBtn.style.position='fixed';
editBtn.style.top='20px';
editBtn.style.right='20px';
editBtn.style.padding='8px 10px';
editBtn.style.background='rgba(255,255,255,0.9)';
editBtn.style.color='#000';
editBtn.style.borderRadius='6px';
editBtn.style.zIndex='10003';
editBtn.style.textDecoration='none';
editBtn.style.fontFamily='sans-serif';
document.body.appendChild(editBtn);


/* SNSボタン */

const lineBtn=document.getElementById("line-link");
const xBtn=document.getElementById("x-link");
const instaBtn=document.getElementById("insta-link");

function setSNS(button,url){
  if(url&&url.trim()!==""){
    button.href=url;
    button.style.display="flex";
  }else{
    button.style.display="none";
  }
}


/* クリック操作 */

window.addEventListener("click",()=>{
  if(items.length===0) return;
  currentIndex=(currentIndex+1)%items.length;
  updateCarousel();
});


/* スワイプ操作 */

let startX=0;

window.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
});

window.addEventListener("touchend",(e)=>{
  const diff=e.changedTouches[0].clientX-startX;
  if(Math.abs(diff)>50){
    currentIndex=diff>0
      ?(currentIndex-1+items.length)%items.length
      :(currentIndex+1)%items.length;
    updateCarousel();
  }
});


/* Firestore リアルタイム同期 */

onSnapshot(doc(db,"arUsers",markerId),async(docSnap)=>{

  if(!docSnap.exists()) return;

  const data=docSnap.data();

  setSNS(lineBtn,data.line);
  setSNS(xBtn,data.x);
  setSNS(instaBtn,data.instagram);

  // シーン未初期化の場合はmindUrlを使って初期化
  if(!sceneInitialized){
    const mindUrl=data.mindUrl||DEFAULT_MIND_URL;
    initARScene(mindUrl);
  }

  const images=data.images||[];
  const ratios=data.ratios||[];
  const bgType=data.bgType||"solid";
  const bgColor=data.bgColor||"#111827";
  const bgGradientColor1=data.bgGradientColor1||"#111827";
  const bgGradientColor2=data.bgGradientColor2||"#0f172a";
  const bgImageUrl=data.bgImageUrl||"";
  const bgOpacity=typeof data.bgOpacity==="number"?data.bgOpacity:0.4;
  const bgWidth=typeof data.bgWidth==="number"?data.bgWidth:4;
  const bgHeight=typeof data.bgHeight==="number"?data.bgHeight:1.8;
  const bgOffsetY=typeof data.bgOffsetY==="number"?data.bgOffsetY:0;

  // ARコンテンツをリセット
  while(arTarget.firstChild){
    arTarget.removeChild(arTarget.firstChild);
  }
  items=[];
  currentIndex=0;

  // 背景
  const backgroundPlane=document.createElement("a-plane");
  backgroundPlane.setAttribute("width",Math.max(bgWidth,(images.length||1)*3));
  backgroundPlane.setAttribute("height",bgHeight);
  backgroundPlane.setAttribute("position",`0 ${bgOffsetY} -0.001`);

  if(bgType==="solid"){
    backgroundPlane.setAttribute("material",{
      shader:"flat",
      transparent:true,
      opacity:bgOpacity,
      color:bgColor
    });
  } else {
    const bgTexture=await createBackgroundTexture(bgType,bgColor,bgGradientColor1,bgGradientColor2,bgImageUrl);
    backgroundPlane.setAttribute("material",{
      src:bgTexture,
      shader:"flat",
      transparent:true,
      opacity:bgOpacity
    });
  }

  arTarget.appendChild(backgroundPlane);

  // 各画像スライド
  // MindAR座標系: X=右, Y=上, Z=カメラ方向
  // AR.jsのZ軸（横置きマーカーの奥行き=視覚上の上下）をMindARのY軸に変換（反転）

  for(let i=0;i<images.length;i++){

    const url=images[i];

    const container=document.createElement("a-entity");
    container.setAttribute("visible","false");

    const aImg=document.createElement("a-image");
    aImg.setAttribute("src",url);
    aImg.setAttribute("material","shader:flat;transparent:true;side:double");

    const ratio=ratios[i]||1;
    const baseW=1.8;

    aImg.setAttribute("width",baseW);
    aImg.setAttribute("height",(baseW*ratio).toFixed(3));
    aImg.setAttribute("position","0 0 0.01");
    container.appendChild(aImg);


    /* 名前 */

    const nameFontFamily=data.font||"sans-serif";
    const nameFontSize=data.fontSize?`${data.fontSize}px`:"60px";
    const nameColor=data.nameColor||"#00f2ff";
    const nameOffsetX=typeof data.nameOffsetX==="number"?data.nameOffsetX:0;
    const nameOffsetZ=typeof data.nameOffsetZ==="number"?data.nameOffsetZ:-0.3;
    const nameWidth=1.8*(data.fontSize?data.fontSize/80:1);
    const nameHeight=0.45*(data.fontSize?data.fontSize/80:1);

    const nPlane=document.createElement("a-plane");
    // AR.js座標(±3程度)→MindAR座標(±1=画像幅)へ0.15倍でスケール変換
    const S=0.15;
    nPlane.setAttribute("position",`${nameOffsetX*S} ${-nameOffsetZ*S} 0.02`);
    nPlane.setAttribute("width",nameWidth.toFixed(3));
    nPlane.setAttribute("height",nameHeight.toFixed(3));

    const nameSrc=await createTextTexture(data.name||"NO NAME",nameColor,nameFontSize,nameFontFamily);
    nPlane.setAttribute("material",{src:nameSrc,transparent:true,shader:"flat"});
    container.appendChild(nPlane);


    /* 肩書き */

    const jobFontFamily=data.font||"sans-serif";
    const jobFontSize=data.fontSize?`${Math.max(40,Math.round(data.fontSize*0.75))}px`:"45px";
    const jobColor=data.jobColor||"#ffcc00";
    const jobOffsetX=typeof data.jobOffsetX==="number"?data.jobOffsetX:0;
    const jobOffsetZ=typeof data.jobOffsetZ==="number"?data.jobOffsetZ:0.3;
    const jobWidth=1.4*(data.fontSize?data.fontSize/80:1);
    const jobHeight=0.35*(data.fontSize?data.fontSize/80:1);

    const jPlane=document.createElement("a-plane");
    jPlane.setAttribute("position",`${jobOffsetX*S} ${-jobOffsetZ*S} 0.02`);
    jPlane.setAttribute("width",jobWidth.toFixed(3));
    jPlane.setAttribute("height",jobHeight.toFixed(3));

    const jobSrc=await createTextTexture(data.job||"NO TITLE",jobColor,jobFontSize,jobFontFamily);
    jPlane.setAttribute("material",{src:jobSrc,transparent:true,shader:"flat"});
    container.appendChild(jPlane);

    items.push(container);
    arTarget.appendChild(container);

  }

  updateCarousel();

});

});

</script>

</body>
</html>
