<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBER AR - PORTFOLIO</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
}

.hud{
position:fixed;
top:20px;
left:20px;
color:#00f2ff;
font-family:monospace;
font-size:12px;
pointer-events:none;
z-index:10001;
text-shadow:0 0 5px #00f2ff;
}

.rec-dot{
display:inline-block;
width:10px;
height:10px;
background:red;
border-radius:50%;
margin-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

</style>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentIndex=0;
let items=[];

window.addEventListener("load",()=>{

const marker=document.querySelector("a-marker");

const urlParams=new URLSearchParams(window.location.search);

const markerId=urlParams.get("id") || "akazawa";

document.querySelector(".hud").innerHTML=
`<div class="rec-dot"></div> REC: AR_SYSTEM_ACTIVE<br>USER: ${markerId}`;


onSnapshot(doc(db,"arUsers",markerId),(docSnap)=>{

if(!docSnap.exists()) return;

const data=docSnap.data();

const images=data.images||[];
const ratios=data.ratios||[];
const nameValue=data.name||"";
const jobValue=data.job||"";
const pattUrl=data.pattUrl||"";


// マーカー更新
if(pattUrl){
marker.setAttribute("url",pattUrl);
}


// リセット
while(marker.firstChild){
marker.removeChild(marker.firstChild);
}

addDecorations(marker);

items=[];


// コンテンツ生成
images.forEach((url,i)=>{

const entity=document.createElement("a-entity");

entity.setAttribute("visible","false");


//画像
const img=document.createElement("a-image");

img.setAttribute("src",url);

img.setAttribute("rotation","-90 0 0");

img.setAttribute("material","shader:flat;transparent:true;alphaTest:0.5;side:double");

const ratio=ratios[i]||1;

const baseW=1.6;

img.setAttribute("width",baseW);

img.setAttribute("height",baseW*ratio);

entity.appendChild(img);


//名前
const nameText=document.createElement("a-text");

nameText.setAttribute("value",nameValue);

nameText.setAttribute("align","center");

nameText.setAttribute("position","0 0.1 -1.1");

nameText.setAttribute("rotation","-90 0 0");

nameText.setAttribute("width","3");

nameText.setAttribute("font","https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf");

entity.appendChild(nameText);


//肩書
const jobText=document.createElement("a-text");

jobText.setAttribute("value",jobValue);

jobText.setAttribute("align","center");

jobText.setAttribute("position","0 0.1 1.1");

jobText.setAttribute("rotation","-90 0 0");

jobText.setAttribute("width","2");

jobText.setAttribute("color","#ffcc00");

jobText.setAttribute("font","https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf");

entity.appendChild(jobText);


marker.appendChild(entity);

items.push(entity);

});

updateCarousel();

});


function addDecorations(target){

const p=document.createElement("a-plane");

p.setAttribute("color","#ff9900");

p.setAttribute("width","2.2");

p.setAttribute("height","1.4");

p.setAttribute("position","0 0.01 0");

p.setAttribute("rotation","-90 0 0");

p.setAttribute("material","shader:flat;opacity:0.3;transparent:true;blending:additive;depthWrite:false");

target.appendChild(p);

}


function updateCarousel(){

if(items.length===0) return;

items.forEach((item,index)=>{

const isCenter=(index===currentIndex);

const offset=(index-currentIndex)*2.2;

item.setAttribute("visible",Math.abs(index-currentIndex)<=1);

item.setAttribute("position",`${offset} ${isCenter?0.2:0.15} 0`);

item.setAttribute("scale",isCenter?"1 1 1":"0.6 0.6 0.6");

});

}


//クリック
marker.addEventListener("click",()=>{

currentIndex=(currentIndex+1)%items.length;

updateCarousel();

});


});

</script>

</head>

<body>

<div class="hud"></div>

<a-scene
embedded
arjs="sourceType:webcam;debugUIEnabled:false;"
vr-mode-ui="enabled:false"
>

<a-marker type="pattern"></a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
