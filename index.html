<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CYBER AR - PORTFOLIO FINAL</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&family=Playfair+Display:wght@700&family=Caveat:wght@700&family=Aloha:wght@400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:#000;
}

@font-face{
  font-family:'CorporateMincho';
  src:url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff2'),
      url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff');
  font-display: swap;
  font-weight: normal;
  font-style: normal;
}

.hud{
position:fixed;
top:20px;
left:20px;
color:#00f2ff;
font-family:monospace;
font-size:12px;
pointer-events:none;
z-index:10001;
text-shadow:0 0 5px #00f2ff;
}

.rec-dot{
display:inline-block;
width:10px;
height:10px;
background:red;
border-radius:50%;
margin-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}


/* SNS */

.sns-container{
position:fixed;
bottom:25px;
right:25px;
display:flex;
flex-direction:row-reverse;
gap:20px;
z-index:10002;
}

#insta-link,
#x-link,
#line-link{
display:none;
}

.btn-border-shadow{
position:relative;
display:flex;
justify-content:center;
align-items:center;
width:50px;
height:50px;
cursor:pointer;
text-decoration:none;
background:rgba(255,255,255,0.85);
border-radius:50%;
}

.btn-border-shadow:before{
position:absolute;
top:-6px;
left:-6px;
width:100%;
height:100%;
content:"";
transition:all .3s ease;
border:3px solid #000;
border-radius:50%;
box-shadow:3px 3px 0 #78e5e5;
box-sizing:content-box;
}

.btn-border-shadow:hover{
transform:translate(-3px,-3px);
}

.btn-border-shadow:hover:before{
top:0;
left:0;
box-shadow:0 0 0 #78e5e5;
}

.btn-border-shadow img{
width:60%;
height:60%;
object-fit:contain;
z-index:1;
}

</style>
</head>

<body>

<div class="hud"></div>


<div class="sns-container">

<a href="#" id="line-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/LINE.png">
</a>

<a href="#" id="x-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/X.png">
</a>

<a href="#" id="insta-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/instagram.png">
</a>

</div>


<a-scene
embedded
arjs="sourceType:webcam; debugUIEnabled:false;"
vr-mode-ui="enabled:false"
>

<a-marker type="pattern" url="assets/markers/pattern-AKA2.patt"></a-marker>

<a-entity camera></a-entity>

</a-scene>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let currentIndex=0;
let items=[];


/* 日本語Canvas */

function createTextTexture(text,color,fontSize="50px",fontFamily="sans-serif"){

const canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=128;

const ctx=canvas.getContext("2d");

ctx.clearRect(0,0,512,128);
ctx.fillStyle=color;
ctx.font=`bold ${fontSize} "${fontFamily}", sans-serif`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,256,64);

return canvas.toDataURL();

}

async function createBackgroundTexture(type, color, gradient1, gradient2, imageUrl){
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=1024;
  canvas.height=1024;

  if(type==="gradient"){
    const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0,gradient1);
    grad.addColorStop(1,gradient2);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else if(type==="image" && imageUrl){
    const img=new Image();
    img.crossOrigin="anonymous";
    await new Promise((resolve,reject)=>{
      img.onload=resolve;
      img.onerror=()=>reject(new Error("背景画像の読み込みに失敗しました"));
      img.src=imageUrl;
    });
    const aspect=img.width/img.height;
    let drawW=canvas.width;
    let drawH=canvas.height;
    if(aspect>1){
      drawH=canvas.width/aspect;
    } else {
      drawW=canvas.height*aspect;
    }
    const ox=(canvas.width-drawW)/2;
    const oy=(canvas.height-drawH)/2;
    ctx.drawImage(img,ox,oy,drawW,drawH);
  } else {
    ctx.fillStyle=color;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  return canvas.toDataURL("image/png");
}


/* サイバー装飾 */

function addDecorations(target){

const p=document.createElement("a-plane");

p.setAttribute("color","#ff9900");
p.setAttribute("width","2.2");
p.setAttribute("height","1.4");

p.setAttribute("position","0 0.01 0");
p.setAttribute("rotation","-90 0 0");

p.setAttribute("material","shader:flat;opacity:0.2;transparent:true;blending:additive;");

target.appendChild(p);

["-1.4 0.1 0.6","1.4 0.1 0.6"].forEach(pos=>{

const c=document.createElement("a-circle");

c.setAttribute("radius","0.08");
c.setAttribute("color","#ff8c00");

c.setAttribute("position",pos);
c.setAttribute("rotation","-90 0 0");

c.setAttribute("material","shader:flat;transparent:true;opacity:0.6;blending:additive");

target.appendChild(c);

});

}



window.addEventListener("load",()=>{

const marker=document.querySelector("a-marker");

const urlParams=new URLSearchParams(window.location.search);
const markerId=urlParams.get("id") || "akazawa";

const hud=document.querySelector(".hud");

hud.innerHTML=`<div class="rec-dot"></div>REC AR ACTIVE<br>USER:${markerId}`;


/* SNSボタン */

const lineBtn=document.getElementById("line-link");
const xBtn=document.getElementById("x-link");
const instaBtn=document.getElementById("insta-link");


function setSNS(button,url){

if(url && url.trim()!==""){

button.href=url;
button.style.display="flex";

}else{

button.style.display="none";

}

}


/* Firestore */

onSnapshot(doc(db,"arUsers",markerId),async(docSnap)=>{

if(!docSnap.exists()) return;

const data=docSnap.data();


setSNS(lineBtn,data.line);
setSNS(xBtn,data.x);
setSNS(instaBtn,data.instagram);

marker.setAttribute("url", data.pattUrl || "assets/markers/pattern-AKA2.patt");

const images=data.images || [];
const ratios=data.ratios || [];
const bgType = data.bgType || "solid";
const bgColor = data.bgColor || "#111827";
const bgGradientColor1 = data.bgGradientColor1 || "#111827";
const bgGradientColor2 = data.bgGradientColor2 || "#0f172a";
const bgImageUrl = data.bgImageUrl || "";
const bgOpacity = typeof data.bgOpacity === "number" ? data.bgOpacity : 0.4;
const bgWidth = typeof data.bgWidth === "number" ? data.bgWidth : 4;
const bgHeight = typeof data.bgHeight === "number" ? data.bgHeight : 1.8;
const bgOffsetY = typeof data.bgOffsetY === "number" ? data.bgOffsetY : 0;


while(marker.firstChild){
marker.removeChild(marker.firstChild);
}

items=[];

const backgroundPlane = document.createElement("a-plane");
backgroundPlane.setAttribute("width", Math.max(bgWidth, (images.length || 1) * 3));
backgroundPlane.setAttribute("height", bgHeight);
backgroundPlane.setAttribute("rotation", "-90 0 0");
backgroundPlane.setAttribute("position", `0 ${bgOffsetY - 0.05} 0`);
backgroundPlane.setAttribute("material", "shader:flat;transparent:true;");

if(bgType === "solid"){
  backgroundPlane.setAttribute("material", {
    shader: "flat",
    transparent: true,
    opacity: bgOpacity,
    color: bgColor
  });
} else {
  const bgTexture = await createBackgroundTexture(bgType, bgColor, bgGradientColor1, bgGradientColor2, bgImageUrl);
  backgroundPlane.setAttribute("material", {
    src: bgTexture,
    shader: "flat",
    transparent: true,
    opacity: bgOpacity
  });
}

marker.appendChild(backgroundPlane);

images.forEach((url,i)=>{

const container=document.createElement("a-entity");
container.setAttribute("visible","false");


const aImg=document.createElement("a-image");

aImg.setAttribute("src",url);
aImg.setAttribute("rotation","-90 0 0");
aImg.setAttribute("material","shader:flat;transparent:true;side:double");

const ratio=ratios[i] || 1;
const baseW=1.4;

aImg.setAttribute("width",baseW);
aImg.setAttribute("height",baseW*ratio);

container.appendChild(aImg);


/* 名前 */

const nameFontFamily = data.font || "sans-serif";
const nameFontSize = data.fontSize ? `${data.fontSize}px` : "60px";
const nameColor = data.nameColor || "#00f2ff";
const nameOffsetX = typeof data.nameOffsetX === "number" ? data.nameOffsetX : 0;
const nameOffsetY = typeof data.nameOffsetY === "number" ? data.nameOffsetY : 0.1;
const nameOffsetZ = typeof data.nameOffsetZ === "number" ? data.nameOffsetZ : -0.3;
const nameWidth = 1.8 * (data.fontSize ? data.fontSize / 80 : 1);
const nameHeight = 0.45 * (data.fontSize ? data.fontSize / 80 : 1);

const nPlane=document.createElement("a-plane");

nPlane.setAttribute("position",`${nameOffsetX} ${nameOffsetY} ${nameOffsetZ}`);
nPlane.setAttribute("rotation","-90 0 0");

nPlane.setAttribute("width",nameWidth.toFixed(3));
nPlane.setAttribute("height",nameHeight.toFixed(3));

nPlane.setAttribute("material",{
src:createTextTexture(data.name || "NO NAME",nameColor,nameFontSize,nameFontFamily),
transparent:true,
shader:"flat"
});

container.appendChild(nPlane);


/* 肩書き */

const jobFontFamily = data.font || "sans-serif";
const jobFontSize = data.fontSize ? `${Math.max(40, Math.round(data.fontSize * 0.75))}px` : "45px";
const jobColor = data.jobColor || "#ffcc00";
const jobOffsetX = typeof data.jobOffsetX === "number" ? data.jobOffsetX : 0;
const jobOffsetY = typeof data.jobOffsetY === "number" ? data.jobOffsetY : 0.1;
const jobOffsetZ = typeof data.jobOffsetZ === "number" ? data.jobOffsetZ : 0.3;
const jobWidth = 1.4 * (data.fontSize ? data.fontSize / 80 : 1);
const jobHeight = 0.35 * (data.fontSize ? data.fontSize / 80 : 1);

const jPlane=document.createElement("a-plane");

jPlane.setAttribute("position",`${jobOffsetX} ${jobOffsetY} ${jobOffsetZ}`);
jPlane.setAttribute("rotation","-90 0 0");

jPlane.setAttribute("width",jobWidth.toFixed(3));
jPlane.setAttribute("height",jobHeight.toFixed(3));

jPlane.setAttribute("material",{
src:createTextTexture(data.job || "NO TITLE",jobColor,jobFontSize,jobFontFamily),
transparent:true,
shader:"flat"
});

container.appendChild(jPlane);


marker.appendChild(container);

items.push(container);

});


updateCarousel();

});


function updateCarousel(){

items.forEach((item,index)=>{

const isCenter=(index===currentIndex);
const offset=(index-currentIndex)*2.2;

item.setAttribute("visible",Math.abs(index-currentIndex)<=1);

item.setAttribute("position",{
x:offset,
y:isCenter?0.2:0.1,
z:0
});

item.setAttribute("scale",isCenter?"1 1 1":"0.7 0.7 0.7");

});

}


/* クリック操作 */

window.addEventListener("click",()=>{

if(items.length===0) return;

currentIndex=(currentIndex+1)%items.length;

updateCarousel();

});


/* スワイプ操作 */

let startX=0;

window.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX;

});

window.addEventListener("touchend",(e)=>{

let diff=e.changedTouches[0].clientX-startX;

if(Math.abs(diff)>50){

currentIndex=diff>0
?(currentIndex-1+items.length)%items.length
:(currentIndex+1)%items.length;

updateCarousel();

}

});

});

</script>

</body>
</html>
