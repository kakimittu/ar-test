<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR名刺</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene
embedded
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
vr-mode-ui="enabled: false">

<a-assets>
<a-asset-item
id="jpfont"
src="https://cdn.jsdelivr.net/gh/etiennepinchon/aframe-fonts/fonts/notosansjp/NotoSansJP-Regular.json">
</a-asset-item>
</a-assets>

<a-marker type="pattern" url="assets/markers/pattern-AKA2.patt">

<a-text
value="山田 太郎"
font="#jpfont"
align="center"
color="#000"
position="0 0.6 0"
scale="1 1 1">
</a-text>

<a-text
value="XR Developer"
font="#jpfont"
align="center"
color="#444"
position="0 0.3 0"
scale="0.8 0.8 0.8">
</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
