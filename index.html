<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>AR Viewer - 名刺表示</title>

<!-- A-Frame + AR.js -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
  html,body{height:100%;margin:0;background:#000}
  #msg {
    position: absolute; left: 12px; top: 12px; z-index: 999;
    background: rgba(0,0,0,0.5); color: #fff; padding:8px 12px; border-radius:6px;
    font-family: sans-serif; font-size:14px;
  }
</style>
</head>
<body>

<div id="msg">データ読み込み中...</div>

<!-- AR Scene -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
  <a-assets id="assets"></a-assets>

  <!-- マーカーは後から script で作ります -->
  <a-entity id="marker-root"></a-entity>

  <a-entity camera></a-entity>
</a-scene>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* ----- Firebase 設定（editor と同じにする） ----- */
const firebaseConfig = {
  apiKey: "ここはそのまま",
  authDomain: "armisetai.firebaseapp.com",
  projectId: "armisetai",
  storageBucket: "armisetai.firebasestorage.app",
  messagingSenderId: "1006973944547",
  appId: "1:1006973947547:web:adc5e195039585bbdabbd6" // 実際の appId を editor と合わせてください
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ----- ユーティリティ ----- */
function qsParam(name, defaultVal) {
  const url = new URL(location.href);
  return url.searchParams.get(name) || defaultVal;
}

function createTextDataURL(text, color = "#ffffff", fontSize = 80, width = 1024, height = 256) {
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0, width, height);
  // optional: background transparent
  ctx.fillStyle = "rgba(0,0,0,0)";
  ctx.fillRect(0,0,width,height);
  ctx.fillStyle = color;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = `bold ${fontSize}px sans-serif`;
  // auto-scale font if text too long
  const maxTextWidth = width * 0.9;
  let measured = ctx.measureText(text).width;
  if (measured > maxTextWidth) {
    const ratio = maxTextWidth / measured;
    const newSize = Math.floor(fontSize * ratio);
    ctx.font = `bold ${Math.max(24,newSize)}px sans-serif`;
  }
  ctx.fillText(text, width/2, height/2);
  return canvas.toDataURL("image/png");
}

/* create A-Frame a-image with proper material settings to avoid edge lines */
function makeAImage(src, w, h, pos, rot="-90 0 0", extra={}) {
  const el = document.createElement("a-image");
  el.setAttribute("src", src);
  el.setAttribute("rotation", rot);
  el.setAttribute("position", pos);
  el.setAttribute("width", String(w));
  el.setAttribute("height", String(h));
  // improve visuals
  el.setAttribute("material", "shader:flat; transparent:true; side:double;");
  // small offset to reduce z-fighting if needed
  if (extra.zOffset) {
    const p = pos.split(" ").map(Number);
    p[2] = (p[2] || 0) + extra.zOffset;
    el.setAttribute("position", p.join(" "));
  }
  return el;
}

/* ----- メイン: Firestore から読み込んで表示構築 ----- */
(async function main(){
  const markerId = qsParam("id", "akazawa");
  const msg = document.getElementById("msg");
  msg.innerText = `ID: ${markerId} を読み込み中...`;

  try {
    const snap = await getDoc(doc(db, "arUsers", markerId));
    if (!snap.exists()) {
      msg.innerText = `ドキュメントが見つかりません: ${markerId}`;
      return;
    }
    const data = snap.data();
    // editor が保存したフィールド：
    // data.images (base64 array), data.ratios (array), data.name (string), data.job (string), data.pattUrl (string)
    const images = Array.isArray(data.images) ? data.images : [];
    const ratios = Array.isArray(data.ratios) ? data.ratios : [];
    const name = data.name || "";
    const job = data.job || "";
    const pattUrl = data.pattUrl || "";

    msg.innerText = "データ読み込み完了。マーカーを表示してください。";

    // create marker element (use custom pattern if provided)
    const markerRoot = document.getElementById("marker-root");
    let markerEl;
    if (pattUrl && pattUrl.trim() !== "") {
      // If pattUrl looks like a path, use patternUrl
      markerEl = document.createElement("a-marker");
      markerEl.setAttribute("type", "pattern");
      markerEl.setAttribute("url", pattUrl);
    } else {
      // fallback to hiro preset
      markerEl = document.createElement("a-marker");
      markerEl.setAttribute("preset", "hiro");
    }
    markerRoot.appendChild(markerEl);

    // card background plane
    const bg = document.createElement("a-plane");
    bg.setAttribute("width", "2");
    bg.setAttribute("height", "1.2");
    bg.setAttribute("color", "#ffffff");
    bg.setAttribute("position", "0 0 0");
    bg.setAttribute("rotation", "0 0 0"); // plane faces camera when marker on ground
    bg.setAttribute("material", "shader:flat; side:double;");
    // initial scale 0 -> animate to 1
    bg.setAttribute("scale", "0 0 0");
    bg.setAttribute("animation", "property: scale; from:0 0 0; to:1 1 1; dur:700; easing:easeOutBack");
    markerEl.appendChild(bg);

    // Create name and job images (Canvas-based) and add
    const nameDataUrl = createTextDataURL(name, "#000000", 80, 1024, 256);
    const jobDataUrl = createTextDataURL(job, "#333333", 56, 1024, 200);

    // Place photo(s) and text relative to card
    // Photo area: left side
    if (images.length > 0) {
      // show first photo by default
      const photoSrc = images[0];
      const ratio = (ratios && ratios[0]) ? ratios[0] : 1;
      const photoW = 0.6;
      const photoH = 0.6 * ratio;
      const photoPos = "-0.6 0.05 0.02";
      const photoEl = makeAImage(photoSrc, photoW, photoH, photoPos);
      markerEl.appendChild(photoEl);
    }

    // name image
    const nameEl = makeAImage(nameDataUrl, 1.2, 0.3, "0.4 0.25 0.02");
    markerEl.appendChild(nameEl);
    // job image
    const jobEl = makeAImage(jobDataUrl, 1.2, 0.26, "0.4 -0.05 0.02");
    markerEl.appendChild(jobEl);

    // small floating animation for the whole card (y oscillation)
    const floatHolder = document.createElement("a-entity");
    floatHolder.setAttribute("position", "0 0 0");
    floatHolder.setAttribute("animation", "property: position; to:0 0.03 0; dur:1500; dir:alternate; loop:true; easing: easeInOutSine");
    // move children into floatHolder by appending clones
    // we want bg, photo, name, job inside floatHolder -> move them
    // (remove from markerEl and append to floatHolder)
    const childrenToFloat = [bg, nameEl, jobEl];
    if (images.length > 0) {
      // find the photo we appended (last or earlier)
      const photoCandidate = markerEl.querySelector('a-image');
      if (photoCandidate) childrenToFloat.unshift(photoCandidate);
    }
    childrenToFloat.forEach(ch => {
      markerEl.removeChild(ch);
      floatHolder.appendChild(ch);
    });
    markerEl.appendChild(floatHolder);

    // optional: add click to open a URL if you later store it
    // markerEl.addEventListener('click', () => { window.open('https://example.com'); });

    // success
    msg.style.display = "none";

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerText = "読み込みエラー: " + (err.message || err);
  }

})();
</script>

</body>
</html>
