<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CYBER AR - PORTFOLIO</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&family=Playfair+Display:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'CorporateMincho';
  src: url('./assets/fonts/Corporate-Mincho-ver3.woff2') format('woff2');
  font-display: swap;
}
* { box-sizing: border-box; }
body { margin: 0; overflow: hidden; background: #000; }

.hud {
  position: fixed; top: 20px; left: 20px;
  color: #00f2ff; font-family: monospace; font-size: 12px;
  pointer-events: none; z-index: 10001;
  text-shadow: 0 0 5px #00f2ff;
}
.rec-dot {
  display: inline-block; width: 10px; height: 10px;
  background: red; border-radius: 50%; margin-right: 5px;
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.sns-container {
  position: fixed; bottom: 25px; right: 25px;
  display: flex; flex-direction: row-reverse; gap: 20px; z-index: 10002;
}
#insta-link, #x-link, #line-link { display: none; }

.btn-border-shadow {
  position: relative; display: flex;
  justify-content: center; align-items: center;
  width: 50px; height: 50px;
  cursor: pointer; text-decoration: none;
  background: rgba(255,255,255,0.85); border-radius: 50%;
}
.btn-border-shadow::before {
  position: absolute; top: -6px; left: -6px;
  width: 100%; height: 100%; content: "";
  transition: all .3s ease;
  border: 3px solid #000; border-radius: 50%;
  box-shadow: 3px 3px 0 #78e5e5; box-sizing: content-box;
}
.btn-border-shadow:hover { transform: translate(-3px,-3px); }
.btn-border-shadow:hover::before { top: 0; left: 0; box-shadow: 0 0 0 #78e5e5; }
.btn-border-shadow img { width: 60%; height: 60%; object-fit: contain; z-index: 1; }
</style>
</head>
<body>

<div class="hud"></div>

<div class="sns-container">
  <a href="#" id="line-link"  target="_blank" class="btn-border-shadow"><img src="assets/icons/LINE.png" alt="LINE"></a>
  <a href="#" id="x-link"    target="_blank" class="btn-border-shadow"><img src="assets/icons/X.png" alt="X"></a>
  <a href="#" id="insta-link" target="_blank" class="btn-border-shadow"><img src="assets/icons/instagram.png" alt="Instagram"></a>
</div>

<a-scene
  embedded
  arjs="sourceType:webcam; debugUIEnabled:false; trackingMethod:best;"
  vr-mode-ui="enabled:false"
  renderer="logarithmicDepthBuffer:true; precision:medium;"
>
  <!--
    smoothCount / smoothTolerance / smoothThreshold:
      マーカー位置の平滑化 → ガタつき・揺れを大幅に軽減
  -->
  <a-marker
    type="pattern"
    url="assets/markers/pattern-AKA2.patt"
    id="main-marker"
    smooth="true"
    smoothCount="10"
    smoothTolerance="0.01"
    smoothThreshold="5"
    emitevents="true"
  ></a-marker>
  <a-entity camera></a-entity>
</a-scene>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
  authDomain: "armisetai.firebaseapp.com",
  projectId: "armisetai",
  storageBucket: "armisetai.firebasestorage.app",
  messagingSenderId: "1006973944547",
  appId: "1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let currentIndex = 0;
let items = [];

/* ================================================
   画像をプリロード → base64 として返す
   → A-Frame が「未ロード画像」を描こうとして
     チラつく問題を防ぐ
   ================================================ */
function preloadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload  = () => {
      const canvas = document.createElement("canvas");
      canvas.width  = img.width;
      canvas.height = img.height;
      canvas.getContext("2d").drawImage(img, 0, 0);
      resolve(canvas.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = () => {
      // 失敗した場合は元のURLをそのまま返す（フォールバック）
      console.warn("画像プリロード失敗:", url);
      resolve(url);
    };
    img.src = url;
  });
}

/* ================================================
   テキスト → Canvas テクスチャ
   ・指定フォントサイズで収まらない場合は
     自動的にサイズを縮小して必ず全文字を表示する
   ================================================ */
async function createTextTexture(text, color, fontSize = "50px", fontFamily = "sans-serif") {
  const canvas = document.createElement("canvas");
  canvas.width  = 512;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  try { await document.fonts.load(`bold ${fontSize} "${fontFamily}"`); } catch(e) {}

  const padding   = 20; // 左右の余白
  const maxWidth  = canvas.width - padding * 2;
  let size = parseInt(fontSize, 10) || 50;
  const minSize = 18; // これ以上は縮小しない下限

  // 収まるサイズまで自動的に縮小
  while (size > minSize) {
    ctx.font = `bold ${size}px "${fontFamily}", sans-serif`;
    if (ctx.measureText(text).width <= maxWidth) break;
    size -= 2;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle    = color;
  ctx.font         = `bold ${size}px "${fontFamily}", sans-serif`;
  ctx.textAlign    = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, canvas.width / 2, canvas.height / 2, maxWidth);
  return canvas.toDataURL();
}

/* ---- 背景テクスチャ ---- */
async function createBackgroundTexture(type, color, gradient1, gradient2, imageUrl) {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = 1024;
  const ctx = canvas.getContext("2d");
  if (type === "gradient") {
    const grad = ctx.createLinearGradient(0, 0, 1024, 1024);
    grad.addColorStop(0, gradient1);
    grad.addColorStop(1, gradient2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1024, 1024);
  } else if (type === "image" && imageUrl) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    await new Promise((res, rej) => {
      img.onload  = res;
      img.onerror = () => rej(new Error("背景画像ロード失敗"));
      img.src = imageUrl;
    });
    const aspect = img.width / img.height;
    let dw = 1024, dh = 1024;
    if (aspect > 1) dh = 1024 / aspect;
    else            dw = 1024 * aspect;
    ctx.drawImage(img, (1024-dw)/2, (1024-dh)/2, dw, dh);
  } else {
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 1024, 1024);
  }
  return canvas.toDataURL("image/png");
}

/* ---- カルーセル位置更新 ---- */
function updateCarousel() {
  items.forEach((item, index) => {
    const isCenter = (index === currentIndex);
    const offset   = (index - currentIndex) * 2.6;
    item.setAttribute("visible", Math.abs(index - currentIndex) <= 1 ? "true" : "false");
    item.setAttribute("position", `${offset} ${isCenter ? 0.14 : 0.12} 0`);
    item.setAttribute("scale",    isCenter ? "1 1 1" : "0.75 0.75 0.75");
  });
}

/* ================================================
   Firestore データから全コンテンツを構築する
   → 全画像・テクスチャのロード完了を待ってから
     まとめて DOM に追加する（チラつき防止）
   ================================================ */
async function buildContent(marker, data) {

  const images           = data.images            || [];
  const ratios           = data.ratios             || [];
  const bgType           = data.bgType             || "solid";
  const bgColor          = data.bgColor            || "#111827";
  const bgGradientColor1 = data.bgGradientColor1   || "#111827";
  const bgGradientColor2 = data.bgGradientColor2   || "#0f172a";
  const bgImageUrl       = data.bgImageUrl         || "";
  const bgOpacity        = typeof data.bgOpacity   === "number" ? data.bgOpacity  : 0.4;
  const bgWidth          = typeof data.bgWidth     === "number" ? data.bgWidth    : 4;
  const bgHeight         = typeof data.bgHeight    === "number" ? data.bgHeight   : 1.8;
  const bgOffsetY        = typeof data.bgOffsetY   === "number" ? data.bgOffsetY  : 0;

  const fontFamily  = data.font       || "sans-serif";
  const nameFontSize= data.fontSize   ? `${data.fontSize}px`                               : "60px";
  const jobFontSize = data.fontSize   ? `${Math.max(40, Math.round(data.fontSize * 0.75))}px` : "45px";
  const nameColor   = data.nameColor  || "#00f2ff";
  const jobColor    = data.jobColor   || "#ffcc00";

  const nameOffsetX = typeof data.nameOffsetX === "number" ? data.nameOffsetX : 0;
  const nameOffsetY = typeof data.nameOffsetY === "number" ? data.nameOffsetY : 0.1;
  const nameOffsetZ = typeof data.nameOffsetZ === "number" ? data.nameOffsetZ : -0.3;
  const jobOffsetX  = typeof data.jobOffsetX  === "number" ? data.jobOffsetX  : 0;
  const jobOffsetY  = typeof data.jobOffsetY  === "number" ? data.jobOffsetY  : 0.1;
  const jobOffsetZ  = typeof data.jobOffsetZ  === "number" ? data.jobOffsetZ  : 0.3;

  const nameWidth  = 1.8 * (data.fontSize ? data.fontSize / 80 : 1);
  const nameHeight = 0.45 * (data.fontSize ? data.fontSize / 80 : 1);
  const jobWidth   = 1.4 * (data.fontSize ? data.fontSize / 80 : 1);
  const jobHeight  = 0.35 * (data.fontSize ? data.fontSize / 80 : 1);

  // ================================================
  // 【重要】全アセットを並列プリロードしてから描画
  // ================================================
  const [nameSrc, jobSrc, bgTexture, ...preloadedImages] = await Promise.all([
    createTextTexture(data.name || "NO NAME", nameColor, nameFontSize, fontFamily),
    createTextTexture(data.job  || "NO TITLE", jobColor, jobFontSize,  fontFamily),
    bgType !== "solid"
      ? createBackgroundTexture(bgType, bgColor, bgGradientColor1, bgGradientColor2, bgImageUrl)
      : Promise.resolve(null),
    ...images.map(url => preloadImage(url))
  ]);

  // ---- DOM を一気に構築 ----
  const fragment = document.createDocumentFragment();

  // 背景パネル
  const bg = document.createElement("a-plane");
  bg.setAttribute("width",    Math.max(bgWidth, (images.length || 1) * 3));
  bg.setAttribute("height",   bgHeight);
  bg.setAttribute("rotation", "-90 0 0");
  bg.setAttribute("position", `0 ${bgOffsetY - 0.05} 0`);
  if (bgType === "solid" || !bgTexture) {
    bg.setAttribute("material", { shader: "flat", transparent: true, opacity: bgOpacity, color: bgColor });
  } else {
    bg.setAttribute("material", { src: bgTexture, shader: "flat", transparent: true, opacity: bgOpacity });
  }
  fragment.appendChild(bg);

  // 画像カルーセルアイテム
  const newItems = [];
  for (let i = 0; i < images.length; i++) {
    const container = document.createElement("a-entity");
    container.setAttribute("visible", "false");

    // 写真（プリロード済み base64）
    const aImg = document.createElement("a-image");
    aImg.setAttribute("src",      preloadedImages[i]);
    aImg.setAttribute("rotation", "-90 0 0");
    aImg.setAttribute("material", "shader:flat;transparent:true;side:double");
    const baseW = 1.8;
    aImg.setAttribute("width",  baseW);
    aImg.setAttribute("height", (baseW * (ratios[i] || 1)).toFixed(3));
    container.appendChild(aImg);

    // 名前
    const nPlane = document.createElement("a-plane");
    nPlane.setAttribute("position", `${nameOffsetX} ${nameOffsetY} ${nameOffsetZ}`);
    nPlane.setAttribute("rotation", "-90 0 0");
    nPlane.setAttribute("width",    nameWidth.toFixed(3));
    nPlane.setAttribute("height",   nameHeight.toFixed(3));
    nPlane.setAttribute("material", { src: nameSrc, transparent: true, shader: "flat" });
    container.appendChild(nPlane);

    // 肩書き
    const jPlane = document.createElement("a-plane");
    jPlane.setAttribute("position", `${jobOffsetX} ${jobOffsetY} ${jobOffsetZ}`);
    jPlane.setAttribute("rotation", "-90 0 0");
    jPlane.setAttribute("width",    jobWidth.toFixed(3));
    jPlane.setAttribute("height",   jobHeight.toFixed(3));
    jPlane.setAttribute("material", { src: jobSrc, transparent: true, shader: "flat" });
    container.appendChild(jPlane);

    newItems.push(container);
    fragment.appendChild(container);
  }

  // ---- 旧DOMを消してから一括追加（チラつき最小化）----
  while (marker.firstChild) marker.removeChild(marker.firstChild);
  marker.appendChild(fragment);

  items = newItems;
  currentIndex = 0;
  updateCarousel();
}

/* ================================================
   メイン初期化
   ================================================ */
window.addEventListener("load", () => {

  const marker   = document.querySelector("a-marker");
  const urlParams= new URLSearchParams(window.location.search);
  const markerId = urlParams.get("id") || "akazawa";

  // HUD
  document.querySelector(".hud").innerHTML =
    `<div class="rec-dot"></div>REC AR ACTIVE<br>USER:${markerId}`;

  // EDITボタン
  const editBtn = document.createElement("a");
  editBtn.href = `editor.html?id=${markerId}`;
  editBtn.textContent = "EDIT";
  Object.assign(editBtn.style, {
    position: "fixed", top: "20px", right: "20px",
    padding: "8px 10px", background: "rgba(255,255,255,0.9)",
    color: "#000", borderRadius: "6px", zIndex: "10003",
    textDecoration: "none", fontFamily: "sans-serif"
  });
  document.body.appendChild(editBtn);

  // SNS
  function setSNS(id, url) {
    const btn = document.getElementById(id);
    if (url && url.trim()) { btn.href = url; btn.style.display = "flex"; }
    else                   { btn.style.display = "none"; }
  }

  // Firestoreリアルタイム購読
  // データが変わったときだけ buildContent を呼ぶ（毎フレーム再構築しない）
  let lastDataJson = "";

  onSnapshot(doc(db, "arUsers", markerId), async (docSnap) => {
    if (!docSnap.exists()) return;
    const data = docSnap.data();

    // データが実際に変化したときだけ再構築（不要な再描画を防ぐ）
    const dataJson = JSON.stringify(data);
    if (dataJson === lastDataJson) return;
    lastDataJson = dataJson;

    setSNS("line-link",  data.line      || "");
    setSNS("x-link",     data.x         || "");
    setSNS("insta-link", data.instagram || "");

    marker.setAttribute("url", data.pattUrl || "assets/markers/pattern-AKA2.patt");

    // 全アセットロード完了後に描画
    await buildContent(marker, data);
  });

  // タップ/クリックで次の画像へ
  window.addEventListener("click", () => {
    if (items.length === 0) return;
    currentIndex = (currentIndex + 1) % items.length;
    updateCarousel();
  });

  // スワイプ操作
  let startX = 0;
  window.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; }, { passive: true });
  window.addEventListener("touchend",   (e) => {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) {
      currentIndex = diff > 0
        ? (currentIndex - 1 + items.length) % items.length
        : (currentIndex + 1) % items.length;
      updateCarousel();
    }
  }, { passive: true });

});
</script>

</body>
</html>
