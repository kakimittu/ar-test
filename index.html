<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>AR PORTFOLIO - Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .hud { position: fixed; top: 20px; left: 20px; color: #00f2ff; font-family: monospace; z-index: 999; text-shadow: 0 0 6px #00f2ff; }
    </style>
</head>
<body>
    <div class="hud">SYSTEM: READY</div>

    <a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false;" vr-mode-ui="enabled:false">
        <a-marker id="marker" type="pattern" url="assets/markers/pattern-AKA2.patt">
            </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZA", 
            authDomain: "armisetai.firebaseapp.com",
            projectId: "armisetai",
            storageBucket: "armisetai.firebasestorage.app",
            messagingSenderId: "1006973944547",
            appId: "1:1006973944547:web:adc5e195039585bbdabbd6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let items = [];
        let currentIndex = 0;

        // 文字を画像化する関数（確実に反映されるよう改良）
        function createTextTexture(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 512, 128);
            ctx.fillStyle = color;
            ctx.font = "bold 60px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 256, 64);
            return canvas.toDataURL();
        }

        onSnapshot(doc(db, "arUsers", "akazawa"), (docSnap) => {
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            const images = data.images || [];
            const ratios = data.ratios || [];
            const marker = document.getElementById("marker");

            while (marker.firstChild) marker.removeChild(marker.firstChild);
            items = [];

            images.forEach((url, i) => {
                const container = document.createElement("a-entity");
                
                // 1. メイン画像
                const img = document.createElement("a-image");
                img.setAttribute("src", url);
                img.setAttribute("rotation", "-90 0 0");
                const r = ratios[i] || 1;
                img.setAttribute("width", "1.2");
                img.setAttribute("height", 1.2 * r);
                container.appendChild(img);

                // 2. 名前ラベル (Canvas)
                const nPlane = document.createElement("a-plane");
                nPlane.setAttribute("position", "0 0.1 -0.8");
                nPlane.setAttribute("rotation", "-90 0 0");
                nPlane.setAttribute("width", "1.5");
                nPlane.setAttribute("height", "0.4");
                nPlane.setAttribute("material", {
                    src: createTextTexture(data.name || "", "#00f2ff"),
                    transparent: true, shader: "flat"
                });
                container.appendChild(nPlane);

                // 3. 職業ラベル (Canvas)
                const jPlane = document.createElement("a-plane");
                jPlane.setAttribute("position", "0 0.1 0.8");
                jPlane.setAttribute("rotation", "-90 0 0");
                jPlane.setAttribute("width", "1.2");
                jPlane.setAttribute("height", "0.3");
                jPlane.setAttribute("material", {
                    src: createTextTexture(data.job || "", "#ffcc00"),
                    transparent: true, shader: "flat"
                });
                container.appendChild(jPlane);

                marker.appendChild(container);
                items.push(container);
            });
            updateCarousel();
        });

        function updateCarousel() {
            items.forEach((item, index) => {
                const offset = (index - currentIndex) * 2.0; // 間隔を2.0に広げる
                const isCenter = index === currentIndex;
                
                // 直接 position を書き換えて重なりを解消
                item.setAttribute("position", {x: offset, y: isCenter ? 0.2 : 0, z: 0});
                item.setAttribute("visible", Math.abs(index - currentIndex) <= 1);
                item.setAttribute("scale", isCenter ? "1 1 1" : "0.7 0.7 0.7");
            });
        }

        // クリックで次へ
        window.addEventListener("click", () => {
            if (items.length === 0) return;
            currentIndex = (currentIndex + 1) % items.length;
            updateCarousel();
        });
    </script>
</body>
</html>
