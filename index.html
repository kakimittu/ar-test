<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AR 名刺</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#000;
}
</style>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType: webcam; debugUIEnabled: false;">

<a-marker type="pattern" url="assets/markers/pattern-AKA2.patt">

<a-entity id="content"></a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"ここはそのまま",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


const markerId="akazawa";


async function loadAR(){

const ref=doc(db,"arUsers",markerId);

const snap=await getDoc(ref);

if(!snap.exists()){
console.log("データなし");
return;
}

const data=snap.data();

createAR(data);

}


function createTextImage(text,color){

return new Promise(resolve=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=1024;
canvas.height=256;

ctx.fillStyle="rgba(0,0,0,0)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font="bold 80px sans-serif";
ctx.fillStyle=color;
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(text,canvas.width/2,canvas.height/2);

resolve(canvas.toDataURL("image/png"));

});

}



async function createAR(data){

const container=document.getElementById("content");

const images=data.images||[];
const ratios=data.ratios||[];

const nameImg=await createTextImage(data.name,"#ffffff");
const jobImg=await createTextImage(data.job,"#ffcc00");

const count=images.length>0?images.length:1;

for(let i=0;i<count;i++){

const entity=document.createElement("a-entity");

let posX=(i===0)?0:(i%2===1?Math.ceil(i/2)*2.5:Math.ceil(i/2)*-2.5);

entity.setAttribute("position",`${posX} 0 0`);

if(images[i]){

const img=document.createElement("a-image");

img.setAttribute("src",images[i]);
img.setAttribute("rotation","-90 0 0");

const ratio=ratios[i]||1;

img.setAttribute("width",2);
img.setAttribute("height",2*ratio);

entity.appendChild(img);

}

const name=document.createElement("a-image");

name.setAttribute("src",nameImg);
name.setAttribute("width",3);
name.setAttribute("height",0.8);
name.setAttribute("rotation","-90 0 0");
name.setAttribute("position","0 0.1 -1.8");

entity.appendChild(name);

const job=document.createElement("a-image");

job.setAttribute("src",jobImg);
job.setAttribute("width",3);
job.setAttribute("height",0.8);
job.setAttribute("rotation","-90 0 0");
job.setAttribute("position","0 0.1 1.8");

entity.appendChild(job);

container.appendChild(entity);

}

}


loadAR();

</script>

</body>
</html>
