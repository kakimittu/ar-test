<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYBER AR - PORTFOLIO FINAL</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    .hud { 
      position: fixed; top: 20px; left: 20px; color: #00f2ff; 
      font-family: monospace; font-size: 12px; pointer-events: none; 
      z-index: 10001; text-shadow: 0 0 5px #00f2ff; 
    }
    .rec-dot { 
      display: inline-block; width: 10px; height: 10px; background: red; 
      border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; 
    }
    @keyframes blink { 50% { opacity: 0; } }

/* SNSコンテナの配置 */
.sns-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: row-reverse; /* 右から左へ並べる */
    gap: 12px;
    z-index: 10002;
}

/* ボタンの外枠 */
.sns-btn {
    width: 48px;
    height: 48px;
    border: 1.5px solid rgba(0, 242, 255, 0.5);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
}

/* アイコン画像そのもの */
.sns-btn img {
    width: 70%;  /* ボタン枠内のサイズ */
    height: 70%;
    object-fit: contain;
    filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.8)); /* アイコンを光らせる */
}

/* タップ/ホバー時の演出 */
.sns-btn:active, .sns-btn:hover {
    transform: scale(1.1) translateY(-5px);
    border-color: #00f2ff;
    background: rgba(0, 242, 255, 0.2);
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
}
  </style>
</head>

<body>
  <div class="hud"></div>

  <div class="sns-container">
    <a href="#" id="line-link" target="_blank" class="sns-btn">
        <img src="assets/icons/line.png" alt="LINE">
    </a>
    <a href="#" id="youtube-link" target="_blank" class="sns-btn">
        <img src="assets/icons/youtube.png" alt="YouTube">
    </a>
    <a href="#" id="x-link" target="_blank" class="sns-btn">
        <img src="assets/icons/x.png" alt="X">
    </a>
    <a href="#" id="insta-link" target="_blank" class="sns-btn">
        <img src="assets/icons/instagram.png" alt="Instagram">
    </a>
</div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-marker type="pattern" url="assets/markers/pattern-AKA2.patt">
      </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZA",
      authDomain: "armisetai.firebaseapp.com",
      projectId: "armisetai",
      storageBucket: "armisetai.firebasestorage.app",
      messagingSenderId: "1006973944547",
      appId: "1:1006973944547:web:adc5e195039585bbdabbd6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentIndex = 0;
    let items = [];

    // --- 日本語Canvasテクスチャ生成関数 ---
    function createTextTexture(text, color, fontSize = "50px") {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 512, 128);
      ctx.fillStyle = color;
      ctx.font = `bold ${fontSize} sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 256, 64);
      return canvas.toDataURL();
    }

    // --- サイバー装飾の配置 ---
    function addDecorations(target) {
      const p = document.createElement("a-plane");
      p.setAttribute("color", "#ff9900"); p.setAttribute("width", "2.2"); p.setAttribute("height", "1.4");
      p.setAttribute("position", "0 0.01 0"); p.setAttribute("rotation", "-90 0 0");
      p.setAttribute("material", "shader: flat; opacity: 0.2; transparent: true; blending: additive;");
      target.appendChild(p);

      ["-1.4 0.1 0.6", "1.4 0.1 0.6"].forEach(pos => {
        const c = document.createElement("a-circle");
        c.setAttribute("radius", "0.08"); c.setAttribute("color", "#ff8c00");
        c.setAttribute("position", pos); c.setAttribute("rotation", "-90 0 0");
        c.setAttribute("material", "shader: flat; transparent: true; opacity: 0.6; blending: additive");
        target.appendChild(c);
      });
    }

    window.addEventListener("load", () => {
      const marker = document.querySelector("a-marker");
      const urlParams = new URLSearchParams(window.location.search);
      const markerId = urlParams.get('id') || 'akazawa'; 

      const hud = document.querySelector(".hud");
      hud.innerHTML = `<div class="rec-dot"></div> REC: AR_SYSTEM_ACTIVE<br>USER: ${markerId}`;

      // リアルタイム監視
      onSnapshot(doc(db, "arUsers", markerId), (docSnap) => {
        if (!docSnap.exists()) return;
        
        const data = docSnap.data();
        const images = data.images || [];
        const ratios = data.ratios || [];

        // リセット
        while (marker.firstChild) { marker.removeChild(marker.firstChild); }
        addDecorations(marker);
        items = [];

        images.forEach((url, i) => {
          const container = document.createElement("a-entity");
          container.setAttribute("visible", "false");

          // メイン画像
          const aImg = document.createElement("a-image");
          aImg.setAttribute("src", url);
          aImg.setAttribute("rotation", "-90 0 0");
          aImg.setAttribute("material", "shader: flat; transparent: true; side: double");
          const ratio = ratios[i] || 1;
          const baseW = 1.4;
          aImg.setAttribute("width", baseW);
          aImg.setAttribute("height", baseW * ratio);
          container.appendChild(aImg);

          // 名前 (日本語対応Canvas)
          const nPlane = document.createElement("a-plane");
          nPlane.setAttribute("position", "0 0.1 -1.1");
          nPlane.setAttribute("rotation", "-90 0 0");
          nPlane.setAttribute("width", "1.8"); nPlane.setAttribute("height", "0.45");
          nPlane.setAttribute("material", {
            src: createTextTexture(data.name || "NO NAME", "#00f2ff", "60px"),
            transparent: true, shader: "flat"
          });
          container.appendChild(nPlane);

          // 肩書き (日本語対応Canvas)
          const jPlane = document.createElement("a-plane");
          jPlane.setAttribute("position", "0 0.1 1.1");
          jPlane.setAttribute("rotation", "-90 0 0");
          jPlane.setAttribute("width", "1.4"); jPlane.setAttribute("height", "0.35");
          jPlane.setAttribute("material", {
            src: createTextTexture(data.job || "NO TITLE", "#ffcc00", "45px"),
            transparent: true, shader: "flat"
          });
          container.appendChild(jPlane);

          marker.appendChild(container);
          items.push(container);
        });
        updateCarousel();
      });

      function updateCarousel() {
        items.forEach((item, index) => {
          const isCenter = (index === currentIndex);
          const offset = (index - currentIndex) * 2.2;
          item.setAttribute("visible", Math.abs(index - currentIndex) <= 1);
          item.setAttribute("position", {x: offset, y: isCenter ? 0.2 : 0.1, z: 0});
          item.setAttribute("scale", isCenter ? "1 1 1" : "0.7 0.7 0.7");
        });
      }

      // 操作系
      window.addEventListener("click", () => {
        if (items.length === 0) return;
        currentIndex = (currentIndex + 1) % items.length;
        updateCarousel();
      });

      let startX = 0;
      window.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; });
      window.addEventListener("touchend", (e) => {
        let diff = e.changedTouches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
          currentIndex = diff > 0 ? (currentIndex - 1 + items.length) % items.length : (currentIndex + 1) % items.length;
          updateCarousel();
        }
      });
    });
  </script>
</body>
</html>
