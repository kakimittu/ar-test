<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CYBER AR - PORTFOLIO FINAL</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
}

.hud{
position:fixed;
top:20px;
left:20px;
color:#00f2ff;
font-family:monospace;
font-size:12px;
pointer-events:none;
z-index:10001;
text-shadow:0 0 5px #00f2ff;
}

.rec-dot{
display:inline-block;
width:10px;
height:10px;
background:red;
border-radius:50%;
margin-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}


/* SNS */

.sns-container{
position:fixed;
bottom:25px;
right:25px;
display:flex;
flex-direction:row-reverse;
gap:20px;
z-index:10002;
}

#insta-link,
#x-link,
#line-link{
display:none;
}

.btn-border-shadow{
position:relative;
display:flex;
justify-content:center;
align-items:center;
width:50px;
height:50px;
cursor:pointer;
text-decoration:none;
background:rgba(255,255,255,0.85);
border-radius:50%;
}

.btn-border-shadow:before{
position:absolute;
top:-6px;
left:-6px;
width:100%;
height:100%;
content:"";
transition:all .3s ease;
border:3px solid #000;
border-radius:50%;
box-shadow:3px 3px 0 #78e5e5;
box-sizing:content-box;
}

.btn-border-shadow:hover{
transform:translate(-3px,-3px);
}

.btn-border-shadow:hover:before{
top:0;
left:0;
box-shadow:0 0 0 #78e5e5;
}

.btn-border-shadow img{
width:60%;
height:60%;
object-fit:contain;
z-index:1;
}

</style>
</head>

<body>

<div class="hud"></div>


<div class="sns-container">

<a href="#" id="line-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/LINE.png">
</a>

<a href="#" id="x-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/X.png">
</a>

<a href="#" id="insta-link" target="_blank" class="btn-border-shadow">
<img src="assets/icons/instagram.png">
</a>

</div>


<a-scene
embedded
arjs="sourceType:webcam; debugUIEnabled:false;"
vr-mode-ui="enabled:false"
>

<a-marker type="pattern" url="assets/markers/pattern-AKA2.patt"></a-marker>

<a-entity camera></a-entity>

</a-scene>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAHJPzHf4QR3V4GOcd0l3s-_VvSSYeWZAA",
authDomain:"armisetai.firebaseapp.com",
projectId:"armisetai",
storageBucket:"armisetai.firebasestorage.app",
messagingSenderId:"1006973944547",
appId:"1:1006973944547:web:adc5e195039585bbdabbd6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let currentIndex=0;
let items=[];


/* 日本語Canvas */

function createTextTexture(text,color,fontSize="50px"){

const canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=128;

const ctx=canvas.getContext("2d");

ctx.clearRect(0,0,512,128);
ctx.fillStyle=color;
ctx.font=`bold ${fontSize} sans-serif`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,256,64);

return canvas.toDataURL();

}





window.addEventListener("load",()=>{

const marker=document.querySelector("a-marker");

const urlParams=new URLSearchParams(window.location.search);
const markerId=urlParams.get("id") || "akazawa";

const hud=document.querySelector(".hud");

hud.innerHTML=`<div class="rec-dot"></div>REC AR ACTIVE<br>USER:${markerId}`;


/* SNSボタン */

const lineBtn=document.getElementById("line-link");
const xBtn=document.getElementById("x-link");
const instaBtn=document.getElementById("insta-link");


function setSNS(button,url){

if(url && url.trim()!==""){

button.href=url;
button.style.display="flex";

}else{

button.style.display="none";

}

}


/* Firestore */

onSnapshot(doc(db,"arUsers",markerId),(docSnap)=>{

if(!docSnap.exists()) return;

const data=docSnap.data();


setSNS(lineBtn,data.line);
setSNS(xBtn,data.x);
setSNS(instaBtn,data.instagram);


const images=data.images || [];
const ratios=data.ratios || [];


while(marker.firstChild){
marker.removeChild(marker.firstChild);
}

items=[];

const baseW=1.3;
const maxRatio=ratios.length>0?Math.max(...ratios):1;

images.forEach((url,i)=>{

const container=document.createElement("a-entity");
container.setAttribute("visible","false");

const ratio=ratios[i]||1;

// シアン枠：4本のプレーンで画像を囲む
const th=0.018;
const imgH=baseW*ratio;
const bMat="color: #00f2ff; opacity: 0.9; shader: flat";
[
  [baseW+th*2, th, 0,               imgH/2+th/2],
  [baseW+th*2, th, 0,             -(imgH/2+th/2)],
  [th, imgH+th*2,  baseW/2+th/2,               0],
  [th, imgH+th*2, -(baseW/2+th/2),             0],
].forEach(([w,h,x,y])=>{
  const strip=document.createElement("a-plane");
  strip.setAttribute("rotation","-90 0 0");
  strip.setAttribute("width",w.toFixed(3));
  strip.setAttribute("height",h.toFixed(3));
  strip.setAttribute("position",`${x.toFixed(3)} 0.03 ${y.toFixed(3)}`);
  strip.setAttribute("material",bMat);
  container.appendChild(strip);
});

const aImg=document.createElement("a-image");
aImg.setAttribute("src",url);
aImg.setAttribute("rotation","-90 0 0");
aImg.setAttribute("material","shader:flat;transparent:true;side:double");
aImg.setAttribute("width",baseW);
aImg.setAttribute("height",(baseW*ratio).toFixed(3));
aImg.setAttribute("position","0 0.02 0");
container.appendChild(aImg);

marker.appendChild(container);
items.push(container);

});

// テキストエリア（画像の下に固定）
const nameColor=data.nameColor||"#00f2ff";
const jobColor=data.jobColor||"#ffcc00";
const imgEdgeZ=baseW*maxRatio/2;

const textBg=document.createElement("a-plane");
textBg.setAttribute("rotation","-90 0 0");
textBg.setAttribute("width",(baseW+0.025).toFixed(3));
textBg.setAttribute("height","0.55");
textBg.setAttribute("position",`0 0.01 ${(imgEdgeZ+0.28).toFixed(3)}`);
textBg.setAttribute("material","color: #000814; opacity: 0.8; shader: flat");
marker.appendChild(textBg);

const nPlane=document.createElement("a-plane");
nPlane.setAttribute("rotation","-90 0 0");
nPlane.setAttribute("width",(baseW*0.65).toFixed(3));
nPlane.setAttribute("height",((baseW*0.65)/4).toFixed(3));
nPlane.setAttribute("position",`0 0.02 ${(imgEdgeZ+0.12).toFixed(3)}`);
nPlane.setAttribute("material",{src:createTextTexture(data.name||"NO NAME",nameColor,"60px"),transparent:true,shader:"flat"});
marker.appendChild(nPlane);

const jPlane=document.createElement("a-plane");
jPlane.setAttribute("rotation","-90 0 0");
jPlane.setAttribute("width",(baseW*0.53).toFixed(3));
jPlane.setAttribute("height",((baseW*0.53)/4).toFixed(3));
jPlane.setAttribute("position",`0 0.02 ${(imgEdgeZ+0.40).toFixed(3)}`);
jPlane.setAttribute("material",{src:createTextTexture(data.job||"NO TITLE",jobColor,"45px"),transparent:true,shader:"flat"});
marker.appendChild(jPlane);


updateCarousel();

});


function updateCarousel(){

items.forEach((item,index)=>{

const isCenter=(index===currentIndex);
const offset=(index-currentIndex)*1.5; // 画像幅1.3+余白0.2

item.setAttribute("visible",Math.abs(index-currentIndex)<=1);

item.setAttribute("position",{
x:offset,
y:isCenter?0.2:0.1,
z:0
});

item.setAttribute("scale",isCenter?"1 1 1":"0.7 0.7 0.7");

});

}


/* クリック操作 */

window.addEventListener("click",()=>{

if(items.length===0) return;

currentIndex=(currentIndex+1)%items.length;

updateCarousel();

});


/* スワイプ操作 */

let startX=0;

window.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX;

});

window.addEventListener("touchend",(e)=>{

let diff=e.changedTouches[0].clientX-startX;

if(Math.abs(diff)>50){

currentIndex=diff>0
?(currentIndex-1+items.length)%items.length
:(currentIndex+1)%items.length;

updateCarousel();

}

});

});

</script>

</body>
</html>
