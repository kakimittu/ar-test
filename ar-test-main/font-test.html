<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>日本語フォント重量級テスト</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body style="margin: 0;">

    <a-scene background="color: #222">
        <a-entity camera position="0 1.6 5"></a-entity>

        <a-box position="-2 1.6 -3" color="red"></a-box>

        <a-text 
            value="こんにちは世界！\n読み込み成功" 
            font="./assets/fonts/mplus-msdf.json"
            font-image="./assets/fonts/mplus-msdf.png"
            shader="msdf" 
            negate="false"
            color="#00f2ff" 
            width="10" 
            position="0 1.6 -3" 
            align="center">
        </a-text>

        <a-text value="Loading Check..." position="0 0.5 -3" align="center"></a-text>
    </a-scene>

</body>
</html>
