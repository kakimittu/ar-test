nasync function createBackgroundTexture(type, color, gradient1, gradient2, imageUrl){
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=1024;
  canvas.height=1024;

n  if(type==="gradient"){
    const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0,gradient1);
    grad.addColorStop(1,gradient2);
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else if(type==="image" && imageUrl){
    const img=new Image();
    img.crossOrigin="anonymous";
    await new Promise((resolve,reject)=>{
      img.onload=resolve;
      img.onerror=()=>reject(new Error("背景画像の読み込みに失敗しました"));
      img.src=imageUrl;
    });
    const aspect=img.width/img.height;
    let drawW=canvas.width;
    let drawH=canvas.height;
    if(aspect>1){
      drawH=canvas.width/aspect;
    } else {
      drawW=canvas.height*aspect;
    }
    const ox=(canvas.width-drawW)/2;
    const oy=(canvas.height-drawH)/2;
    ctx.drawImage(img,ox,oy,drawW,drawH);
  } else {
    ctx.fillStyle=color;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

n  return canvas.toDataURL("image/png");
}
